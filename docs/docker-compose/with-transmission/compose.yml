services:
  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: mstream-transmission
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      # RPC + WebUI auth, interpolated from .env.
      - USER=${TRANSMISSION_USER}
      - PASS=${TRANSMISSION_PASS}
      # Required for cross-container RPC: a fresh Transmission whitelists
      # only 127.0.0.1 and rejects unknown Host headers, but mStream calls
      # from a Docker-network IP with Host `transmission`. USER/PASS is the
      # real security boundary; the whitelist stays private-ranges-only.
      - WHITELIST=127.0.0.1,10.*.*.*,172.*.*.*,192.168.*.*
      - HOST_WHITELIST=transmission
    volumes:
      - ./transmission-config:/config
      # Completed downloads. The same host dir is mounted into mstream as
      # /music:ro; mStream auto-detects the /downloads → /music mapping
      # via Transmission's free-space RPC.
      - ./downloads:/downloads
    ports:
      # Loopback-only while .env holds the placeholder password; drop the
      # prefix after rotating PASS.
      - "127.0.0.1:9091:9091"
      # Peer port — must be internet-reachable for peering.
      - "51413:51413"
      - "51413:51413/udp"
    restart: unless-stopped

  mstream:
    image: lscr.io/linuxserver/mstream:latest
    container_name: mstream
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./mstream-config:/config
      # Read-only view of Transmission's download dir (see above).
      - ./downloads:/music:ro
    ports:
      - "3000:3000"
    depends_on:
      - transmission
    restart: unless-stopped
