# Minimal MPD config for the mStream server-audio sidecar. mStream sends
# absolute file:// URIs at play time, so MPD never indexes the library
# (`auto_update no`).

music_directory    "/music"
db_file            "/var/lib/mpd/mpd.db"
log_file           "/var/log/mpd/mpd.log"
pid_file           "/run/mpd/mpd.pid"
state_file         "/var/lib/mpd/mpd.state"

# Unix socket only — MPD 0.22+ requires a local client for file:// playback.
bind_to_address    "/run/mpd/socket"

auto_update        "no"
default_permissions "read,add,control,admin"

audio_output {
  type       "alsa"
  name       "alsa-out"
  mixer_type "software"
}
