  # ── YouTube DL ───────────────────────────────────────────────────────────

  /api/v1/ytdl:
    post:
      tags: [YouTube DL]
      summary: Start a YouTube download
      description: |
        Downloads the video's audio track, converts it to the requested format, and
        drops it into the target directory. Requires upload permission. Returns
        immediately — track progress via `GET /api/v1/ytdl/downloads`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [directory, url]
              properties:
                directory: { type: string }
                url: { type: string, format: uri }
                outputCodec:
                  type: string
                  enum: [mp3, opus, aac]
                  default: mp3
                metadata:
                  type: object
                  properties:
                    title: { type: string }
                    artist: { type: string }
                    album: { type: string }
                    year: { type: integer }
      responses:
        "200":
          description: Download enqueued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }

  /api/v1/ytdl/metadata:
    get:
      tags: [YouTube DL]
      summary: Fetch YouTube video metadata
      parameters:
        - name: url
          in: query
          required: true
          schema: { type: string, format: uri }
      responses:
        "200":
          description: Metadata.
          content:
            application/json:
              schema:
                type: object
                properties:
                  title: { type: string, nullable: true }
                  artist: { type: string, nullable: true }
                  album: { type: string, nullable: true }
                  year: { type: integer, nullable: true }
                  thumbnail: { type: string, nullable: true }

  /api/v1/ytdl/info:
    get:
      tags: [YouTube DL]
      summary: Velvet-adapter for metadata fetch
      parameters:
        - name: url
          in: query
          required: true
          schema: { type: string, format: uri }
      responses:
        "200":
          description: Metadata (field `thumb` not `thumbnail`).
          content:
            application/json:
              schema:
                type: object
                properties:
                  title: { type: string, nullable: true }
                  artist: { type: string, nullable: true }
                  album: { type: string, nullable: true }
                  thumb: { type: string, nullable: true }

  /api/v1/ytdl/downloads:
    get:
      tags: [YouTube DL]
      summary: List in-progress and recent downloads
      responses:
        "200":
          description: Downloads.
          content:
            application/json:
              schema:
                type: object
                properties:
                  downloads:
                    type: array
                    items:
                      type: object
                      properties:
                        pid: { type: integer }
                        url: { type: string }
                        directory: { type: string }
                        outputCodec: { type: string }
                        status: { type: string }
                        startTime: { type: integer }

  /api/v1/ytdl/download:
    post:
      tags: [YouTube DL]
      summary: Synchronous YouTube download (Velvet)
      description: Blocks up to 5 minutes waiting for the download to finish.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url: { type: string, format: uri }
                title: { type: string }
                artist: { type: string }
                album: { type: string }
                format:
                  type: string
                  enum: [mp3, opus, aac]
      responses:
        "200":
          description: Download complete.
          content:
            application/json:
              schema:
                type: object
                properties:
                  filePath: { type: string }
                  vpath: { type: string }

  # ── Admin - Scanner ──────────────────────────────────────────────────────

  /api/v1/admin/db/params:
    get:
      tags: [Admin - Scanner]
      summary: Get scanner parameters
      responses:
        "200":
          description: Current scanner settings.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScanOptions" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/params/scan-interval:
    post:
      tags: [Admin - Scanner]
      summary: Set scan interval
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scanInterval]
              properties:
                scanInterval: { type: integer, minimum: 0, description: "Hours. 0 disables scheduled rescans." }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/params/skip-img:
    post:
      tags: [Admin - Scanner]
      summary: Set whether album art extraction is skipped
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [skipImg]
              properties:
                skipImg: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/params/boot-scan-delay:
    post:
      tags: [Admin - Scanner]
      summary: Set boot-scan delay
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bootScanDelay]
              properties:
                bootScanDelay: { type: integer, minimum: 0, description: "Seconds." }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/params/compress-image:
    post:
      tags: [Admin - Scanner]
      summary: Set whether album art thumbnails are generated
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [compressImage]
              properties:
                compressImage: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/params/scan-commit-interval:
    post:
      tags: [Admin - Scanner]
      summary: Set scanner commit cadence
      description: Number of files between DB commits during a scan. Lower = shorter write-lock holds.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scanCommitInterval]
              properties:
                scanCommitInterval:
                  type: integer
                  minimum: 1
                  description: |
                    Tracks scanned per SQLite COMMIT. Soft-capped at 1000
                    server-side: values above 1000 are accepted but
                    clamped to 1000 (with a warning logged) rather than
                    rejected, so a typo in the admin UI doesn't 400.
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/params/analyze-bpm:
    post:
      tags: [Admin - Scanner]
      summary: Toggle scanner-time BPM + musical-key detection (stratum-dsp)
      description: |
        Enables or disables stratum-dsp analysis during scans. When true
        (default), the Rust scanner runs BPM + musical-key extraction on
        the same mono PCM buffer it decodes for the waveform cache,
        populating `tracks.bpm` / `tracks.musical_key` /
        `tracks.bpm_source = 'stratum'` for any file without
        tag-sourced values.

        Tag-sourced BPM/key always wins regardless of this flag —
        toggling off does not overwrite an existing TBPM/TKEY value.
        Audiobook-genre tracks and tracks outside the [30s, 30min]
        duration window are skipped by other gates in the scanner.

        Rust-only feature. The JS fallback scanner accepts the
        `analyzeBpm` field in its config but does not run analysis.
        To backfill BPM/key on a previously-scanned library after
        enabling this flag, trigger a force-rescan from the admin
        panel — the fast-path mtime check skips unchanged files
        otherwise.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [analyzeBpm]
              properties:
                analyzeBpm: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/params/auto-album-art:
    post:
      tags: [Admin - Scanner]
      summary: Toggle the post-scan album-art download pass
      description: >
        Enables/disables the downloader that fills cover-art gaps from
        external services after scans. Turning it ON also enqueues an
        immediate pass so results appear without waiting for the next scan.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [autoAlbumArt]
              properties:
                autoAlbumArt: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/params/auto-album-art-mode:
    post:
      tags: [Admin - Scanner]
      summary: Set what the album-art downloader targets
      description: >
        `missing` (default) — only albums with no cover at all. `all` —
        every album; ones that already have a cover get the fetched image
        added to their gallery without touching the existing default
        (identical images are hash-deduped and skipped).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [autoAlbumArtMode]
              properties:
                autoAlbumArtMode:
                  type: string
                  enum: [missing, all]
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/params/auto-album-art-write-to-folder:
    post:
      tags: [Admin - Scanner]
      summary: Toggle writing downloaded covers into album folders as cover.jpg
      description: >
        When enabled, the download pass writes each fetched cover as
        cover.jpg into every folder that holds one of the album's tracks
        (folders with an existing cover.jpg are left untouched). Default
        false. Distinct from album-art-write-to-folder, which applies to
        the manual set-art flow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [autoAlbumArtWriteToFolder]
              properties:
                autoAlbumArtWriteToFolder: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/params/auto-album-art-per-run:
    post:
      tags: [Admin - Scanner]
      summary: Set how many albums the art downloader attempts per pass
      description: >
        Each pass holds the serial task slot for roughly one throttled
        service lookup per album (~1/sec); the cap bounds how long a queued
        scan or backup can wait. The pass re-enqueues itself while a
        backlog remains. Default 100.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [autoAlbumArtPerRun]
              properties:
                autoAlbumArtPerRun:
                  type: integer
                  minimum: 1
                  maximum: 10000
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/params/album-art-write-to-folder:
    post:
      tags: [Admin - Scanner]
      summary: Write fetched cover art as `cover.jpg` in the album folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [albumArtWriteToFolder]
              properties:
                albumArtWriteToFolder: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/params/album-art-write-to-file:
    post:
      tags: [Admin - Scanner]
      summary: Embed fetched cover art in audio files
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [albumArtWriteToFile]
              properties:
                albumArtWriteToFile: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/params/album-art-services:
    post:
      tags: [Admin - Scanner]
      summary: Select which services to query for album art
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [albumArtServices]
              properties:
                albumArtServices:
                  type: array
                  items:
                    type: string
                    enum: [musicbrainz, itunes, deezer]
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/force-compress-images:
    post:
      tags: [Admin - Scanner]
      summary: Re-run the album-art thumbnail compressor over the whole library
      responses:
        "200":
          description: Job status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  started: { type: boolean }
        "405": { $ref: "#/components/responses/AdminLocked" }


  /api/v1/admin/db/scan/all:
    post:
      tags: [Admin - Scanner]
      summary: Scan all libraries
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/scan/force-rescan:
    post:
      tags: [Admin - Scanner]
      summary: Rescan all libraries ignoring mtimes
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/scan/stats:
    get:
      tags: [Admin - Scanner]
      summary: Total track count in the DB
      responses:
        "200":
          description: Count.
          content:
            application/json:
              schema:
                type: object
                properties:
                  fileCount: { type: integer }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/scan/progress:
    get:
      tags: [Admin - Scanner]
      summary: Per-library scan progress (Velvet)
      responses:
        "200":
          description: Progress entries — one per running scan.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    vpath: { type: string }
                    pct: { type: number }
                    scanned: { type: integer }
                    expected: { type: integer, nullable: true }
                    currentFile: { type: string, nullable: true }
                    countingFound: { type: boolean }
        "405": { $ref: "#/components/responses/AdminLocked" }

  # ── Admin - Users ────────────────────────────────────────────────────────

  /api/v1/admin/users:
    get:
      tags: [Admin - Users]
      summary: List all users
      responses:
        "200":
          description: Users keyed by username.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: { $ref: "#/components/schemas/User" }
        "405": { $ref: "#/components/responses/AdminLocked" }
    put:
      tags: [Admin - Users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, vpaths]
              properties:
                username: { type: string }
                password: { type: string }
                vpaths:
                  type: array
                  items: { type: string }
                admin: { type: boolean, default: false }
                allowMkdir: { type: boolean, default: true }
                allowUpload: { type: boolean, default: true }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }
    delete:
      tags: [Admin - Users]
      summary: Delete a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username: { type: string }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/users/password:
    post:
      tags: [Admin - Users]
      summary: Change a user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/users/lastfm:
    post:
      tags: [Admin - Users]
      summary: Set Last.fm credentials for a user
      description: Note — the field names contain a typo (`lasftfm*`) that is preserved for backwards compatibility.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, lasftfmUser, lasftfmPassword]
              properties:
                username: { type: string }
                lasftfmUser: { type: string }
                lasftfmPassword: { type: string }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/users/vpaths:
    post:
      tags: [Admin - Users]
      summary: Update a user's library access list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, vpaths]
              properties:
                username: { type: string }
                vpaths:
                  type: array
                  items: { type: string }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/users/access:
    post:
      tags: [Admin - Users]
      summary: Update a user's role / permission flags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, admin, allowMkdir, allowUpload]
              properties:
                username: { type: string }
                admin: { type: boolean }
                allowMkdir: { type: boolean }
                allowUpload: { type: boolean }
                allowFileModify: { type: boolean, default: true }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  # ── Admin - Libraries ────────────────────────────────────────────────────

  /api/v1/admin/directories:
    get:
      tags: [Admin - Libraries]
      summary: List all libraries
      description: |
        Returns one of two shapes depending on caller:
        - Legacy (admin UI): `{ [vpath]: { root, type } }`
        - Velvet UI: array of `{ name, root, type }` when fetched via the Velvet route.
      responses:
        "200":
          description: Libraries.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    additionalProperties:
                      type: object
                      properties:
                        root: { type: string }
                        type: { type: string }
                  - type: array
                    items: { $ref: "#/components/schemas/Library" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/directory:
    put:
      tags: [Admin - Libraries]
      summary: Add a library
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [directory, vpath]
              properties:
                directory: { type: string, description: "Absolute filesystem path." }
                vpath:
                  type: string
                  pattern: "[a-zA-Z0-9-]+"
                autoAccess: { type: boolean, default: false }
                isAudioBooks: { type: boolean, default: false }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }
    delete:
      tags: [Admin - Libraries]
      summary: Remove a library
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vpath]
              properties:
                vpath:
                  type: string
                  pattern: "[a-zA-Z0-9-]+"
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  # ── Admin - Config ───────────────────────────────────────────────────────

  /api/v1/admin/lock-api:
    post:
      tags: [Admin - Config]
      summary: Lock or unlock the admin API
      deprecated: true
      description: >-
        Superseded by POST /api/v1/admin/config/admin-access.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lock]
              properties:
                lock: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/config:
    get:
      tags: [Admin - Config]
      summary: Get the server configuration
      responses:
        "200":
          description: Config.
          content:
            application/json:
              schema:
                type: object
                properties:
                  address: { type: string }
                  port: { type: integer }
                  noUpload: { type: boolean }
                  noMkdir: { type: boolean }
                  noFileModify: { type: boolean }
                  writeLogs: { type: boolean }
                  logBufferSize: { type: integer }
                  secret:
                    type: string
                    description: Last 4 characters only (the full secret is never returned).
                  ssl: { type: object }
                  storage: { type: object }
                  maxRequestSize: { type: string }
                  autoBootServerAudio: { type: boolean }
                  rustPlayerPort: { type: integer }
                  ui: { type: string, enum: [default, velvet] }
                  adminAccess:
                    type: object
                    properties:
                      mode:
                        type: string
                        enum: [all, none, localhost, whitelist]
                      whitelist:
                        type: array
                        items:
                          type: string
                          description: IP or CIDR string.
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/config/admin-access:
    post:
      tags: [Admin - Config]
      summary: Set admin API access policy
      description: >-
        Controls which clients may reach the admin API. Takes effect live (no
        restart). A `/0` range or malformed whitelist entry is rejected.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode:
                  type: string
                  enum: [all, none, localhost, whitelist]
                whitelist:
                  type: array
                  description: >-
                    IP or CIDR strings. Optional — omit to leave the saved list
                    untouched.
                  items:
                    type: string
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/config/max-request-size:
    post:
      tags: [Admin - Config]
      summary: Set max request body size
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [maxRequestSize]
              properties:
                maxRequestSize:
                  type: string
                  pattern: "[0-9]+(KB|MB)"
                  example: "50MB"
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/config/ui:
    post:
      tags: [Admin - Config]
      summary: Switch UI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ui]
              properties:
                ui:
                  type: string
                  enum: [default, velvet]
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/config/port:
    post:
      tags: [Admin - Config]
      summary: Change server port
      description: Triggers a server restart.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [port]
              properties:
                port: { type: integer }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/config/address:
    post:
      tags: [Admin - Config]
      summary: Change listen address
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address]
              properties:
                address:
                  type: string
                  format: ipv4
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/config/noupload:
    post:
      tags: [Admin - Config]
      summary: Enable/disable uploads server-wide
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [noUpload]
              properties:
                noUpload: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/config/nomkdir:
    post:
      tags: [Admin - Config]
      summary: Enable/disable directory creation server-wide
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [noMkdir]
              properties:
                noMkdir: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/config/nofilemodify:
    post:
      tags: [Admin - Config]
      summary: Enable/disable file modification server-wide
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [noFileModify]
              properties:
                noFileModify: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/config/write-logs:
    post:
      tags: [Admin - Config]
      summary: Enable/disable writing logs to disk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [writeLogs]
              properties:
                writeLogs: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/config/log-buffer-size:
    post:
      tags: [Admin - Config]
      summary: Set the in-memory live-log ring buffer size (lines)
      description: >
        Number of recent log lines kept in memory for the admin live-log
        viewer. 0 disables the buffer. Takes effect immediately (no reboot).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [logBufferSize]
              properties:
                logBufferSize: { type: integer, minimum: 0, maximum: 10000 }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/config/auto-boot-server-audio:
    post:
      tags: [Admin - Config]
      summary: Toggle auto-start of the Rust audio server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [autoBootServerAudio]
              properties:
                autoBootServerAudio: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/config/rust-player-port:
    post:
      tags: [Admin - Config]
      summary: Set the Rust audio server port
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rustPlayerPort]
              properties:
                rustPlayerPort: { type: integer, minimum: 1, maximum: 65535 }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/config/secret:
    post:
      tags: [Admin - Config]
      summary: Regenerate the JWT secret
      description: Invalidates every existing token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [strength]
              properties:
                strength:
                  type: integer
                  minimum: 1
                  description: Byte length of the generated secret.
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  # ── Admin - Transcode ────────────────────────────────────────────────────

  /api/v1/admin/transcode:
    get:
      tags: [Admin - Transcode]
      summary: Get transcode configuration
      responses:
        "200":
          description: Config + availability.
          content:
            application/json:
              schema:
                type: object
                properties:
                  defaultCodec: { type: string }
                  defaultBitrate: { type: string }
                  downloaded: { type: boolean, description: "Whether ffmpeg has been downloaded." }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/transcode/default-codec:
    post:
      tags: [Admin - Transcode]
      summary: Set default transcode codec
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [defaultCodec]
              properties:
                defaultCodec: { type: string, enum: [mp3, opus, aac] }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/transcode/default-bitrate:
    post:
      tags: [Admin - Transcode]
      summary: Set default transcode bitrate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [defaultBitrate]
              properties:
                defaultBitrate: { type: string, enum: ["64k", "96k", "128k", "192k"] }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/transcode/download:
    post:
      tags: [Admin - Transcode]
      summary: Download the bundled ffmpeg binary
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  # ── Admin - DLNA ─────────────────────────────────────────────────────────

  /api/v1/admin/dlna:
    get:
      tags: [Admin - DLNA]
      summary: DLNA configuration
      responses:
        "200":
          description: DLNA settings.
          content:
            application/json:
              schema:
                type: object
                properties:
                  mode: { type: string, enum: [disabled, same-port, separate-port] }
                  port: { type: integer }
                  name: { type: string }
                  uuid: { type: string }
                  browse: { type: string, enum: [flat, dirs, artist, album, genre] }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/dlna/browse:
    post:
      tags: [Admin - DLNA]
      summary: Set the DLNA default browse structure
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [browse]
              properties:
                browse: { type: string, enum: [flat, dirs, artist, album, genre] }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/dlna/mode:
    post:
      tags: [Admin - DLNA]
      summary: Enable/disable DLNA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode: { type: string, enum: [disabled, same-port, separate-port] }
                port: { type: integer, minimum: 1, maximum: 65535 }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  # ── Admin - SSL ──────────────────────────────────────────────────────────

  /api/v1/admin/ssl:
    post:
      tags: [Admin - SSL]
      summary: Upload SSL certificate and key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cert, key]
              properties:
                cert: { type: string, description: "Path to cert file." }
                key: { type: string, description: "Path to key file." }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }
    delete:
      tags: [Admin - SSL]
      summary: Remove SSL certificates
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  # ── Admin - Logs ─────────────────────────────────────────────────────────

  /api/v1/admin/logs/recent:
    get:
      tags: [Admin - Logs]
      summary: Read recent log lines from the in-memory live-log buffer
      description: >
        Returns recent log entries from the in-memory ring buffer that backs
        the admin live-log viewer. Independent of writeLogs — works even when
        on-disk logging is off. Poll with `since` set to the last `lastSeq`
        you received to stream only newer entries.
      parameters:
        - name: since
          in: query
          required: false
          schema: { type: integer, minimum: 0 }
          description: >
            Highest seq already seen. Entries newer than this are returned. A
            stale/out-of-range value (e.g. after a server restart reset the
            counter) returns the full buffer.
      responses:
        "200":
          description: Recent log entries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        seq: { type: integer }
                        t: { type: string, format: date-time }
                        level: { type: string }
                        message: { type: string }
                  lastSeq: { type: integer }
                  capacity: { type: integer }
