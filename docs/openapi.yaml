  # ──────────────────────────────────────────────────────────────────────
  # Torrent — user-facing
  # ──────────────────────────────────────────────────────────────────────

  /api/v1/torrent/preflight:
    get:
      tags: [Torrent]
      summary: Per-user torrent-feature readiness check
      description: |
        Read-only "should the UI even enable the submit button?" check.
        Resolves the user-supplied file-explorer path to a vpath, checks
        the user's `allow_torrent` flag (when whitelist mode is active),
        and checks that the active torrent client has a verified path
        mapping for the vpath.
      parameters:
        - in: query
          name: path
          required: false
          schema: { type: string }
          description: "Library-prefixed file-explorer path the user is currently browsing."
      responses:
        "200":
          description: Preflight result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  active:           { type: boolean }
                  clientType:       { type: string, enum: [disabled, transmission, qbittorrent, deluge] }
                  displayName:      { type: string, nullable: true }
                  noUpload:         { type: boolean }
                  whitelistMode:    { type: boolean }
                  userAllowed:      { type: boolean }
                  vpath:            { type: string, nullable: true }
                  subPath:          { type: string, nullable: true }
                  vpathConfirmed:   { type: boolean }
                  vpathConfidence:  { type: string, enum: [verified, inferred, pending, unconfirmed], nullable: true }
                  daemonPath:       { type: string, nullable: true }
                  reason:           { type: string, nullable: true }

  /api/v1/torrent/auto-detect:
    post:
      tags: [Torrent]
      summary: Extract artist / album / year from a .torrent file
      description: |
        Runs the 3-tier extraction pipeline. Tier 1 parses the torrent's
        name field; Tier 2 walks the file list for music-shape signals;
        Tier 3 (when a vpath is provided and the active client is reachable)
        adds the torrent paused, downloads ~256 KB of one audio file, and
        reads embedded tags.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [torrentFile]
              properties:
                torrentFile: { type: string, format: binary }
                vpath:       { type: string }
      responses:
        "200":
          description: |
            Pipeline result. `ok: false` accompanies `confidence: 'none'`
            and is a legitimate response shape — UI should ask the user
            to fill the metadata fields manually.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:         { type: boolean }
                  metadata:   { $ref: "#/components/schemas/TorrentMetadata" }
                  confidence: { type: string, enum: [high, low, none] }
                  method:     { type: string }
                  sourceName: { type: string }
                  fileShape:  { $ref: "#/components/schemas/TorrentFileShape" }
                  tier3:
                    type: object
                    nullable: true
                    properties:
                      ok:     { type: boolean }
                      reason: { type: string }
                      format: { type: string }
        "400":
          description: Invalid torrent / no source.
          content: { application/json: { schema: { $ref: "#/components/schemas/TorrentErrorEnvelope" }}}
        "403":
          description: User not whitelisted, or torrent feature disabled.
          content: { application/json: { schema: { $ref: "#/components/schemas/TorrentErrorEnvelope" }}}

  /api/v1/torrent/add:
    post:
      tags: [Torrent]
      summary: Submit a torrent to the active client
      description: |
        Hands off a .torrent file or magnet URI to the configured daemon.
        Gates checked, in order: feature-active → user whitelist →
        required fields → per-user vpath authorization → vpath access
        cache → info-hash compute → daemon add → SQL UPSERT of the
        managed_torrents row.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [vpath, directoryName]
              properties:
                vpath:         { type: string }
                subPath:       { type: string }
                directoryName: { type: string, maxLength: 200 }
                magnet:        { type: string }
                torrentFile:   { type: string, format: binary }
      responses:
        "200":
          description: Torrent accepted by the daemon.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:           { type: boolean, enum: [true] }
                  infoHash:     { type: string }
                  name:         { type: string }
                  clientType:   { type: string }
                  downloadPath: { type: string }
                  isDuplicate:
                    type: boolean
                    nullable: true
        "400":
          description: Invalid input.
          content: { application/json: { schema: { $ref: "#/components/schemas/TorrentErrorEnvelope" }}}
        "403":
          description: User not whitelisted, vpath forbidden, or client disabled.
          content: { application/json: { schema: { $ref: "#/components/schemas/TorrentErrorEnvelope" }}}
        "409":
          description: Vpath access cache says the daemon can't reach the library.
          content: { application/json: { schema: { $ref: "#/components/schemas/TorrentErrorEnvelope" }}}
        "412":
          description: No vpath access cache row — admin needs to run auto-detect.
          content: { application/json: { schema: { $ref: "#/components/schemas/TorrentErrorEnvelope" }}}
        "500":
          description: info-hash mismatch or persistence_failed.
          content: { application/json: { schema: { $ref: "#/components/schemas/TorrentErrorEnvelope" }}}
        "502":
          description: Daemon rejected the add or was unreachable.
          content: { application/json: { schema: { $ref: "#/components/schemas/TorrentErrorEnvelope" }}}
        "503":
          description: Active torrent client has no saved credentials.
          content: { application/json: { schema: { $ref: "#/components/schemas/TorrentErrorEnvelope" }}}

  /api/v1/torrent/seed-existing:
    post:
      tags: [Torrent]
      summary: Pre-check whether a torrent's files already exist on disk
      description: |
        User-facing variant of the admin seed-existing route. The
        player's torrent tab calls this BEFORE `POST /torrent/add`
        for every .torrent upload: a `seeded` outcome short-circuits
        the download entirely (the daemon registers the existing files
        as a seed); `already_in_daemon` warns the user they've added
        this hash before; `partial_match` returns a list of vpaths
        where some-but-not-all files live so the UI can prompt the
        operator to point `/torrent/add` at the matching directory.

        Per-user vpath scoping: the optional `vpaths` request field
        is intersected with `req.user.vpaths`; the empty intersection
        short-circuits to `no_match` without touching the daemon.

        Absolute server filesystem paths are STRIPPED from the
        response — see `UserSeedResult` schema for the contract.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [torrentFile]
              properties:
                torrentFile:
                  type: string
                  format: binary
                vpaths:
                  type: string
                  description: |
                    Optional JSON-encoded array of vpath names. Each
                    name is intersected with the caller's
                    `req.user.vpaths`; non-matching entries are
                    silently dropped. Defaults to the full user-allowed
                    set when omitted.
                  example: '["music"]'
      responses:
        "200":
          description: Per-torrent result. See `UserSeedResult`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserSeedResult" }
        "400":
          description: Bad multipart body or missing torrentFile.
          content: { application/json: { schema: { $ref: "#/components/schemas/TorrentErrorEnvelope" }}}
        "403":
          description: Torrent feature disabled or caller not on the whitelist.
          content: { application/json: { schema: { $ref: "#/components/schemas/TorrentErrorEnvelope" }}}
        "503":
          description: Active client has no saved credentials.
          content: { application/json: { schema: { $ref: "#/components/schemas/TorrentErrorEnvelope" }}}

  /api/v1/torrent/path-templates:
    get:
      tags: [Torrent]
      summary: Per-vpath path templates the player should apply
      responses:
        "200":
          description: User-scoped templates.
          content:
            application/json:
              schema:
                type: object
                properties:
                  vpaths:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        template:
                          type: string
                          nullable: true
                  supportedVars:
                    type: array
                    items: { type: string, enum: [ARTIST, ALBUM, YEAR, GENRE, ALBUMARTIST] }
                  suggestedTemplate: { type: string }

