                  token: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/share/list:
    get:
      tags: [Shared Playlists]
      summary: List the user's shared playlists (Velvet)
      responses:
        "200":
          description: Share records.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    playlistId: { type: string }
                    songCount: { type: integer }
                    expires:
                      type: integer
                      nullable: true
                    createdAt: { type: string }

  /api/v1/share/{id}:
    delete:
      tags: [Shared Playlists]
      summary: Delete a shared playlist (Velvet)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }

  # ── File Explorer ────────────────────────────────────────────────────────

  /api/v1/file-explorer:
    post:
      tags: [File Explorer]
      summary: Browse a directory within the user's libraries
      description: Pass an empty string or `~` to list vpaths / home.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [directory]
              properties:
                directory:
                  type: string
                sort:
                  type: boolean
                  default: true
                pullMetadata:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Directory listing.
          content:
            application/json:
              schema:
                type: object
                properties:
                  path: { type: string }
                  directories: { type: array, items: { type: object } }
                  files: { type: array, items: { type: object } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/file-explorer/recursive:
    post:
      tags: [File Explorer]
      summary: Recursively list all audio files under a directory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [directory]
              properties:
                directory: { type: string }
      responses:
        "200":
          description: Array of virtual paths.
          content:
            application/json:
              schema:
                type: array
                items: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/file-explorer/mkdir:
    post:
      tags: [File Explorer]
      summary: Create a directory
      description: Requires per-user mkdir permission. Recursive.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [directory]
              properties:
                directory: { type: string }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/file-explorer/upload:
    post:
      tags: [File Explorer]
      summary: Upload a file
      description: |
        Multipart form upload via busboy. Target directory goes in the `data-location` header.
        Requires per-user upload permission. Filenames are sanitized to prevent path traversal.
      parameters:
        - name: data-location
          in: header
          required: true
          schema: { type: string }
          description: Target directory as virtual path.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/file-explorer/m3u:
    post:
      tags: [File Explorer]
      summary: Parse an M3U playlist file
      description: Returns resolved paths for each entry, sanitized against directory traversal.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path: { type: string }
      responses:
        "200":
          description: Parsed entries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        type: { type: string }
                        name: { type: string }
                        path: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ── Download ─────────────────────────────────────────────────────────────

  /api/v1/download/m3u:
    post:
      tags: [Download]
      summary: Download an M3U playlist + all its tracks as a ZIP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path: { type: string }
      responses:
        "200":
          description: ZIP archive.
          content:
            application/zip:
              schema: { type: string, format: binary }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/download/directory:
    post:
      tags: [Download]
      summary: Download a directory as a ZIP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [directory]
              properties:
                directory: { type: string }
      responses:
        "200":
          description: ZIP archive.
          content:
            application/zip:
              schema: { type: string, format: binary }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/download/shared:
    get:
      tags: [Download]
      summary: Download all files in a shared playlist
      description: Requires a shared-playlist token (issued by `GET /api/v1/shared/{playlistId}`).
      responses:
        "200":
          description: ZIP archive.
          content:
            application/zip:
              schema: { type: string, format: binary }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/download/zip:
    post:
      tags: [Download]
      summary: Download an arbitrary list of files as a ZIP
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [fileArray]
              properties:
                fileArray:
                  type: string
                  description: JSON-stringified array of virtual paths.
      responses:
        "200":
          description: ZIP archive.
          content:
            application/zip:
              schema: { type: string, format: binary }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ── Transcode ────────────────────────────────────────────────────────────

  /transcode/{filepath}:
    get:
      tags: [Transcode]
      summary: Transcode audio on the fly
      description: |
        Streams a transcoded version of the audio file. Streaming begins before transcoding
        finishes. Results are cached for the song's duration plus 2 minutes.
      parameters:
        - name: filepath
          in: path
          required: true
          description: Virtual path (may contain `/`).
          schema: { type: string }
        - name: codec
          in: query
          schema:
            type: string
            enum: [mp3, opus, aac]
        - name: bitrate
          in: query
          schema:
            type: string
            enum: ["64k", "96k", "128k", "192k"]
      responses:
        "200":
          description: Transcoded audio stream.
          headers:
            Content-Type: { schema: { type: string } }
            Content-Length: { schema: { type: integer } }
            Accept-Ranges: { schema: { type: string } }
          content:
            audio/*:
              schema: { type: string, format: binary }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "503":
          description: ffmpeg not available.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # ── Album Art ────────────────────────────────────────────────────────────

  /album-art/{file}:
    get:
      tags: [Album Art]
      summary: Serve a cached album-art file
      security: []
      parameters:
        - name: file
          in: path
          required: true
          schema: { type: string }
        - name: compress
          in: query
          description: '`zl` = large thumbnail, `zs` = small thumbnail. Omit for full-size.'
          schema:
            type: string
            enum: [zl, zs]
      responses:
        "200":
          description: Image.
          content:
            image/*:
              schema: { type: string, format: binary }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/album-art/search:
    post:
      tags: [Album Art]
      summary: Search external services for album art
      description: Queries MusicBrainz, iTunes, and Deezer.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                artist: { type: string }
                album: { type: string }
      responses:
        "200":
          description: Search results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        service: { type: string, enum: [musicbrainz, itunes, deezer] }
                        url: { type: string }
                        label: { type: string }
                  ffmpegAvailable: { type: boolean }

  /api/v1/album-art/set-from-url:
    post:
      tags: [Album Art]
      summary: Download album art from a URL and apply it
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filepath, url]
              properties:
                filepath: { type: string }
                url: { type: string, format: uri }
                writeToFolder: { type: boolean, default: false }
                writeToFile:
                  type: boolean
                  default: false
                  description: Embed into the ID3 tag (needs ffmpeg and write permission).
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, enum: [true] }
        "400": { $ref: "#/components/responses/Forbidden" }

  /api/v1/album-art/upload:
    post:
      tags: [Album Art]
      summary: Upload album art as base64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filepath, image]
              properties:
                filepath: { type: string }
                image:
                  type: string
                  description: Base64-encoded image.
                writeToFolder: { type: boolean, default: false }
                writeToFile: { type: boolean, default: false }
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, enum: [true] }

  /api/v1/album-art/ffmpeg-status:
    get:
      tags: [Album Art]
      summary: Check ffmpeg availability
      responses:
        "200":
          description: Availability.
          content:
            application/json:
              schema:
                type: object
                properties:
                  available: { type: boolean }

  # ── Waveform ─────────────────────────────────────────────────────────────

  /api/v1/db/waveform:
    get:
      tags: [Waveform]
      summary: Get waveform peaks for a track
      description: 800 bars, 0–255 each. Generated on demand and cached.
      parameters:
        - name: filepath
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Waveform data.
          content:
            application/json:
              schema:
                type: object
                properties:
                  waveform:
                    type: array
                    items: { type: integer, minimum: 0, maximum: 255 }
                    minItems: 800
                    maxItems: 800
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ── Lyrics ──────────────────────────────────────────────────────────────

  /api/v1/lyrics:
    get:
      tags: [Lyrics]
      summary: Resolve lyrics for a track (default mStream UI)
      description: |
        Returns the lyrics stored on a track, keyed by its `path`
        (`<vpath>/<relpath>` — the same key the player streams via `/media`).
        Reads only what is already on the track row (populated by the scanner
        and the proactive lyrics-backfill worker), with a read-only
        `lyrics_cache` fallback for a duplicate-hash twin; it never fetches.

        Lyrics come back in two typed containers — plain `lyrics` and timed
        `syncedLyrics` — each a `{ default, lyrics: [] }` list of variants
        (today 0 or 1 entry each, so future multi-source / translation support
        stays non-breaking). Each entry's `data` is the raw stored content; the
        container tells the client whether to render it as plain text
        (`lyrics`) or parse it as LRC (`syncedLyrics`). `default` indexes the
        preferred entry; an empty container's `lyrics` is `[]`.

        Scoped to the caller's accessible libraries — a `path` outside them
        resolves to no track → 404. For the Subsonic ms-offset variant see
        `getLyricsBySongId`.
      parameters:
        - name: path
          in: query
          required: true
          schema: { type: string }
          description: "`<vpath>/<relpath>`, e.g. `MyMusic/Artist/Album/01 Song.flac`."
      responses:
        "200":
          description: The track's lyrics. Both containers are always present (each 0 or 1 entry).
          content:
            application/json:
              schema:
                type: object
                required: [lyrics, syncedLyrics]
                properties:
                  lyrics:
                    type: object
                    description: Plain-text lyrics — each entry's `data` is plain text.
                    required: [default, lyrics]
                    properties:
                      default: { type: integer, description: Index of the preferred entry. }
                      lyrics:
                        type: array
                        items:
                          type: object
                          required: [lang, source, data]
                          properties:
                            lang:   { type: string, nullable: true, description: "Language code, or null if unknown." }
                            source: { type: string, nullable: true, description: "Provenance: `embedded`, `sidecar`, or a provider key (`lrclib`/`netease`/`kugou`); null if unknown." }
                            data:   { type: string, description: "Raw plain-text lyrics." }
                  syncedLyrics:
                    type: object
                    description: Timed lyrics — each entry's `data` is raw LRC.
                    required: [default, lyrics]
                    properties:
                      default: { type: integer, description: Index of the preferred entry. }
                      lyrics:
                        type: array
                        items:
                          type: object
                          required: [lang, source, data]
                          properties:
                            lang:   { type: string, nullable: true, description: "Language code, or null if unknown." }
                            source: { type: string, nullable: true, description: "Provenance: `embedded`, `sidecar`, or a provider key (`lrclib`/`netease`/`kugou`); null if unknown." }
                            data:   { type: string, description: "Raw LRC, e.g. `[00:12.34]line text`." }
        "400":
          description: Missing the required `path` query param.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: No track matches `path` in the caller's libraries, or the track has no lyrics.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # ── User API Keys ───────────────────────────────────────────────────────

  /api/v1/user/api-keys:
    get:
      tags: [User API Keys]
      summary: List the caller's own Subsonic API keys
      description: |
        Returns an array (not a wrapped object) of keys the caller has
        minted. Key strings are never returned — those are view-once at
        creation time; after that only id/name/timestamps are visible.
      responses:
        "200":
          description: Keys minted by this user. Key values NOT returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:         { type: integer }
                    name:       { type: string }
                    created_at: { type: string, format: date-time }
                    last_used:  { type: string, format: date-time, nullable: true }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [User API Keys]
      summary: Mint a new Subsonic API key for the caller
      description: |
        The key value is returned exactly once in this response — after this
        request completes, the server only stores a reference and the key
        cannot be re-displayed. Clients that can't send a JWT cookie (DSub,
        Ultrasonic, Substreamer, etc.) paste the key into their
        `password`/`apiKey` field.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                  description: Free-form label so the user can tell keys apart. Required.
      responses:
        "200":
          description: One-time view of the freshly-minted key.
          content:
            application/json:
              schema:
                type: object
                required: [key, name]
                properties:
                  key:  { type: string }
                  name: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Validation error (missing/blank `name`). }

  /api/v1/user/api-keys/{id}:
    delete:
      tags: [User API Keys]
      summary: Revoke a Subsonic API key
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Key revoked. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { description: No such key (or not owned by caller). }

  # ── Cue Points ───────────────────────────────────────────────────────────

  /api/v1/db/cuepoints:
    get:
      tags: [Cue Points]
      summary: List cue points for a track (Velvet)
      parameters:
        - name: fp
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Cue points.
          content:
            application/json:
              schema:
                type: object
                properties:
                  cuepoints:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        no: { type: integer }
                        title: { type: string, nullable: true }
                        t: { type: number, description: "Position in seconds." }
                        color: { type: string, nullable: true }
    post:
      tags: [Cue Points]
      summary: Create a cue point (Velvet)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filepath, position]
              properties:
                filepath: { type: string }
                position: { type: number, description: "Seconds from start." }
                label: { type: string }
                color: { type: string }
      responses:
        "200":
          description: Created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }

  /api/v1/db/cuepoints/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    put:
      tags: [Cue Points]
      summary: Update a cue point (Velvet)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                position: { type: number }
                label: { type: string }
                color: { type: string }
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, enum: [true] }
    delete:
      tags: [Cue Points]
      summary: Delete a cue point (Velvet)
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, enum: [true] }

  # ── User Settings ────────────────────────────────────────────────────────

  /api/v1/user/settings:
    get:
      tags: [User Settings]
      summary: Get the user's UI preferences (Velvet)
      responses:
        "200":
          description: Prefs and optional queue.
          content:
            application/json:
              schema:
                type: object
                properties:
                  prefs:
                    type: object
                    additionalProperties: { type: string }
                  queue:
                    type: array
                    items: { type: string }
    post:
      tags: [User Settings]
      summary: Save UI preferences / queue (Velvet)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prefs:
                  type: object
                  additionalProperties: { type: string }
                queue:
                  type: array
                  items: { type: string }
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, enum: [true] }

  # ── Last.fm ──────────────────────────────────────────────────────────────

  /api/v1/lastfm/status:
    get:
      tags: [Scrobbler - Last.fm]
      summary: Probe Last.fm availability for this user
      description: |
        Tells the webapp Auto-DJ panel whether Last.fm features are
        actually usable: the server-side API key (`hasApiKey`) gates
        every `artist.getSimilar` call, and `linkedUser` reports
        whether the current user has stored credentials for personal
        scrobbling. Both fields drive UI visibility — the similar-
        artists toggle renders disabled when `hasApiKey === false`.

        Returned values are read-only state, no auth side-effects.
      responses:
        "200":
          description: Last.fm availability + this user's link state.
          content:
            application/json:
              schema:
                type: object
                properties:
                  serverEnabled:
                    type: boolean
                    description: |
                      Whether the operator has configured a Last.fm
                      API key (`lastFM.apiKey` in config). Without
                      this, `similar-artists` returns empty and the
                      webapp Auto-DJ "Similar artists" toggle should
                      be disabled.
                  hasApiKey:
                    type: boolean
                    description: |
                      Duplicate of `serverEnabled` kept for clients
                      reading the original velvet shape.
                  linkedUser:
                    type: string
                    nullable: true
                    description: |
                      The user's stored Last.fm username, or `null`
                      if they haven't linked an account via
                      `POST /api/v1/lastfm/connect`. Used only for
                      personal scrobbling — Auto-DJ similar-artists
                      doesn't depend on this.

  /api/v1/lastfm/connect:
    post:
      tags: [Scrobbler - Last.fm]
      summary: Link Last.fm account (Velvet)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lastfmUser, lastfmPassword]
              properties:
                lastfmUser: { type: string }
                lastfmPassword: { type: string }
      responses:
        "200":
          description: Linked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, enum: [true] }

  /api/v1/lastfm/disconnect:
    post:
      tags: [Scrobbler - Last.fm]
      summary: Unlink Last.fm account
      responses:
        "200":
          description: Unlinked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, enum: [true] }

  /api/v1/lastfm/test-login:
    post:
      tags: [Scrobbler - Last.fm]
      summary: Validate Last.fm credentials before saving
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/lastfm/similar-artists:
    get:
      tags: [Scrobbler - Last.fm]
      summary: Get similar artists (filtered to local library)
      description: |
        Calls Last.fm's `artist.getSimilar`, then intersects the result
        with the local library — returns only the artists that actually
        exist in the user's tracks, using each one's canonical library
        spelling. Pair with `POST /api/v1/db/random-songs`'s `artists`
        body field for Auto-DJ similar-artists picks.

        Matching is fuzzy: case-insensitive, diacritic-folded (`Sigur Ros`
        ≡ `Sigur Rós`), `&`/`and` interchangeable, dots/slashes stripped
        (`M.I.A.` ≡ `MIA`, `AC/DC` ≡ `ACDC`). So a Last.fm result of
        "Beyoncé" matches a library row tagged "Beyonce", and the
        response contains the library's spelling.

        Returns `{ artists: [] }` (NOT a 4xx) when any of:
          - `artist` query param is missing
          - no Last.fm API key configured in `lastFM.apiKey`
          - Last.fm HTTP call failed or returned malformed JSON
          - Last.fm has no similar artists for this name
          - none of the similar artists exist in the local library

        Results are cached per-artist for 24 hours (LRU, 500-entry cap)
        to stay friendly to Last.fm's rate limit.
      parameters:
        - name: artist
          in: query
          required: true
          schema: { type: string }
          description: |
            Source artist name. `feat. X` / `ft. X` / `featuring X` /
            `vs. X` suffixes are stripped before the Last.fm call.
      responses:
        "200":
          description: Library artists similar to the input (may be empty).
          content:
            application/json:
              schema:
                type: object
                properties:
                  artists:
                    type: array
                    description: |
                      Canonical library artist names — suitable for use
                      directly in `/api/v1/db/random-songs` `artists`.
                    items: { type: string }

  /api/v1/lastfm/scrobble-by-metadata:
