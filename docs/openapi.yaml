      tags: [Scrobbler - Last.fm]
      summary: Scrobble a play by metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [track]
              properties:
                artist: { type: string }
                album: { type: string }
                track: { type: string }
      responses:
        "200":
          description: Scrobbled or skipped if user isn't linked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  scrobble:
                    type: boolean
                    nullable: true

  /api/v1/lastfm/scrobble-by-filepath:
    post:
      tags: [Scrobbler - Last.fm]
      summary: Scrobble a play by filepath
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filePath]
              properties:
                filePath: { type: string }
      responses:
        "200":
          description: Scrobbled or skipped if user isn't linked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  scrobble:
                    type: boolean
                    nullable: true

