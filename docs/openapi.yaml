openapi: 3.0.3
info:
  title: mStream API
  version: "1"
  description: |
    REST API for the [mStream](https://github.com/IrosTheBeggar/mStream) music streaming server.

    ## Authentication

    Most endpoints require a JWT bearer token. Tokens are issued by `POST /api/v1/auth/login` and
    can be supplied via any of (checked in order):

    1. Request body field `token`
    2. Query parameter `token`
    3. HTTP header `x-access-token`
    4. Cookie `x-access-token`

    ### Public mode

    If no users exist in the database, all requests are authenticated as a virtual public user with
    full library access — no token required. This is the default for fresh installs.

    ### Special tokens

    - **Admin tokens** have `admin: true` in the payload and are required for every `/api/v1/admin/*` endpoint.
    - **Jukebox tokens** (`jukebox: true`) are short-lived and bound to an active remote-control session.
    - **Shared-playlist tokens** (`shareToken: true`) restrict file access to the tracks in one specific shared playlist.
    - **Federation invite tokens** (`invite: true`) can only call `POST /api/v1/federation/invite/exchange`.

    ## Errors

    Errors use the shape `{ "error": "<message>" }`. Status codes:

    | Code | Meaning |
    |------|---------|
    | 400  | Bad request (invalid input) |
    | 401  | Unauthenticated |
    | 403  | Forbidden (Joi validation error, missing permission) |
    | 404  | Resource not found |
    | 405  | Admin API locked |
    | 500  | Server error |
    | 503  | External dependency unavailable (ffmpeg, rust audio server) |

    ## Virtual paths (vpaths)

    Libraries are mounted under named vpaths (e.g. `music`, `audiobooks`). Filepaths in request/response
    bodies are `<vpath>/<relative/path/within/library>`. The server translates these to absolute paths
    internally and enforces per-user library access on every request.
  license:
    name: GPL-3.0
    url: https://www.gnu.org/licenses/gpl-3.0.en.html

servers:
  - url: http://localhost:3000
    description: Default local server
  - url: "{scheme}://{host}:{port}"
    description: Self-hosted instance
    variables:
      scheme:
        enum: [http, https]
        default: http
      host:
        default: localhost
      port:
        default: "3000"

tags:
  - name: Auth
    description: Login and token issuance.
  - name: System
    description: Server bootstrap, API discovery.
  - name: Library
    description: Artists, albums, genres, tracks — browsing the music database.
  - name: Search
    description: Full-text search across the library.
  - name: Stats
    description: Play counts, ratings, recently-played, Wrapped.
  - name: Playlists
    description: Saved playlists (create, load, modify).
  - name: Smart Playlists
    description: Rule-based dynamic playlists (Velvet UI).
  - name: Shared Playlists
    description: Public shareable playlist links.
  - name: File Explorer
    description: Directory browsing, upload, M3U parsing.
  - name: Download
    description: Multi-file ZIP downloads.
  - name: Transcode
    description: On-the-fly audio transcoding via ffmpeg.
  - name: Album Art
    description: Album art search, upload, serving.
  - name: Waveform
    description: Per-track waveform data for the progress bar.
  - name: Lyrics
    description: |
      Per-track lyrics — embedded tag (USLT / Vorbis LYRICS / MP4 ©lyr / APE Lyrics)
      or sibling `.lrc` / `.txt` sidecar files. LRC-format content is parsed into
      line-timed entries. Optional LRCLib external fallback (opt-in via admin toggle)
      populates a cache table for tracks with no local lyrics. Subsonic clients get
      `/rest/getLyrics` + `/rest/getLyricsBySongId`; the Velvet UI uses this endpoint.
  - name: Subsonic API
    description: |
      Subsonic 1.16.1 + OpenSubsonic REST API served at `/rest/<method>` (and the
      historical `/rest/<method>.view` alias). 61 methods implemented — full spec
      at <https://opensubsonic.netlify.app/docs/>. See the "Show method list" card
      in the admin panel for the full list including per-method FULL/STUB status.
      Auth uses Subsonic's own credential scheme (`u/p`, `u/t/s`, or `apiKey`) —
      NOT mStream's JWT — so these endpoints are not enumerated individually here.
  - name: User API Keys
    description: |
      Per-user API keys for Subsonic clients that can't send a JWT cookie
      (DSub, Ultrasonic, Substreamer, etc.). Mint via the mStream UI; the key
      becomes the `apiKey` query param on every `/rest/*` call.
  - name: Cue Points
    description: Bookmarks/markers within tracks.
  - name: User Settings
    description: Client-persisted preferences and queue state.
  - name: Scrobbler - Last.fm
    description: Last.fm scrobbling integration.
  - name: Scrobbler - ListenBrainz
    description: ListenBrainz scrobbling integration.
  - name: Discogs
    description: Discogs lookup for album art and metadata.
  - name: Server Playback
    description: Proxy to the bundled Rust audio player.
  - name: Jukebox
    description: Remote-control mode via WebSocket-backed REST.
  - name: YouTube DL
    description: Download YouTube audio into the library.
  - name: Admin - Config
    description: Server-level settings (address, port, UI, secret).
  - name: Admin - Scanner
    description: Scanner parameters and manual scan triggers.
  - name: Admin - Users
    description: User CRUD and permission management.
  - name: Admin - Libraries
    description: Library (vpath) CRUD.
  - name: Admin - Transcode
    description: Transcode defaults and ffmpeg setup.
  - name: Admin - DLNA
    description: DLNA server configuration.
  - name: Admin - SSL
    description: SSL certificate management.
  - name: Admin - Logs
    description: Server log download.
  - name: Admin - Discogs
    description: Discogs API credentials.
  - name: Admin - Shared
    description: Shared-playlist administration.
  - name: Admin - File Explorer
    description: Unrestricted filesystem browsing (admin only).
  - name: Admin - Subsonic
    description: |
      Subsonic-specific admin widgets: mode toggle (disabled / same-port /
      separate-port), live now-playing strip, jukebox status, token-auth
      attempts log, per-user API-key minting, lyrics-cache (LRCLib) config +
      stats.
  - name: Federation
    description: Mesh-sync between mStream instances via Syncthing.

security:
  - bearerAuth: []
  - cookieAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Pass the JWT in the `x-access-token` header. Despite the OpenAPI "bearer" label,
        the value does NOT include a `Bearer ` prefix — it's the raw token.
    cookieAuth:
      type: apiKey
      in: cookie
      name: x-access-token

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message.
      example:
        error: Authentication Error

    Empty:
      type: object
      description: Empty success response — the operation completed with no additional data.
      example: {}

    Metadata:
      type: object
      description: Shared track metadata shape used across nearly every library endpoint.
      properties:
        filepath:
          type: string
          description: Virtual path (`<vpath>/<rel>`).
        metadata:
          type: object
          properties:
            title:
              type: string
              nullable: true
            artist:
              type: string
              nullable: true
            album:
              type: string
              nullable: true
            track:
              type: integer
              nullable: true
            disk:
              type: integer
              nullable: true
            year:
              type: integer
              nullable: true
            hash:
              type: string
              nullable: true
              description: Content hash (used as a stable ID across re-scans).
            album-art:
              type: string
              nullable: true
              description: Filename in the album-art cache directory. Serve via `GET /album-art/{file}`.
            rating:
              type: integer
              minimum: 0
              maximum: 10
              nullable: true
            play-count:
              type: integer
              nullable: true
            last-played:
              type: string
              format: date-time
              nullable: true
            replaygain-track:
              type: number
              nullable: true
              description: Track-level ReplayGain adjustment in dB.
            bpm:
              type: integer
              nullable: true
              description: |
                Beats-per-minute, range-validated 20..300 at scan time
                (V32). NULL when the file's `TBPM` / Vorbis `BPM` /
                MP4 `tmpo` tag is absent or out of range. Drives the
                webapp Auto-DJ BPM-continuity feature.
            musical_key:
              type: string
              nullable: true
              description: |
                Musical key as stored in the file's tag (`TKEY` /
                `INITIALKEY` / Vorbis `KEY`), trimmed and capped at
                12 chars at scan time. Format varies by tagger —
                may be a raw key name ("A minor"), a Camelot code
                ("8A"), or an enharmonic spelling ("Am"). Clients
                that need canonicalisation should run the value
                through `toCamelot()` (see the velvet helper or the
                server-side `CAMELOT_TO_KEYS` map).

    Album:
      type: object
      properties:
        name:
          type: string
        artist:
          type: string
          nullable: true
        year:
          type: integer
          nullable: true
        album_art_file:
          type: string
          nullable: true

    Library:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          description: Virtual path (vpath).
        root_path:
          type: string
          description: Absolute filesystem path.
        type:
          type: string
          enum: [music, audio-books]

    User:
      type: object
      properties:
        admin:
          type: boolean
        vpaths:
          type: array
          items:
            type: string
        allowMkdir:
          type: boolean
        allowUpload:
          type: boolean
        allowFileModify:
          type: boolean

    IgnoreVPaths:
      type: object
      properties:
        ignoreVPaths:
          type: array
          items:
            type: string
          description: Libraries (vpaths) to exclude from the query.

    SearchArtistOrAlbumItem:
      type: object
      description: |
        One artist or album hit from `/api/v1/db/search`. The
        `filepath` field is always the literal boolean `false` on
        artist/album rows — used by clients as a sentinel that
        distinguishes "browseable group" results from individual
        tracks (which have a real `filepath` string).
      required: [name, album_art_file, filepath]
      properties:
        name:
          type: string
          description: Artist or album name.
        album_art_file:
          type: string
          nullable: true
          description: Filename of associated cover art, or `null` if none.
            Resolve via `/album-art/<file>`.
        filepath:
          type: boolean
          enum: [false]
          description: Always `false`. Sentinel value distinguishing this
            from a track-shaped result.

    SearchTrackItem:
      type: object
      description: |
        One track hit from `/api/v1/db/search`. Returned in the
        `title` array (when the track's title matched) and the
        `files` array (when the filepath matched).
      required: [name, album_art_file, filepath]
      properties:
        name:
          type: string
          description: |
            Display name. For title-matched tracks: `"<artist> - <title>"`
            when an artist is known, otherwise just the title. For
            filepath-matched tracks: the same library-prefixed path
            value as `filepath`.
        album_art_file:
          type: string
          nullable: true
          description: Filename of the track's cover art, or `null`.
        filepath:
          type: string
          description: Library-prefixed path (e.g. `"music/Artist/Album/01.flac"`).
            Use directly with `/media/<library>/<rest>` to stream.

    ScanOptions:
      type: object
      properties:
        skipImg:
          type: boolean
        scanInterval:
          type: number
        bootScanDelay:
          type: number
        compressImage:
          type: boolean
        scanCommitInterval:
          type: integer
        autoAlbumArt:
          type: boolean
        albumArtWriteToFolder:
          type: boolean
        albumArtWriteToFile:
          type: boolean
        albumArtServices:
          type: array
          items:
            type: string
            enum: [musicbrainz, itunes, deezer]

  responses:
    EmptySuccess:
      description: Operation succeeded.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Empty" }
    Unauthorized:
      description: Auth required or token invalid.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Validation error or permission denied.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    AdminLocked:
      description: Admin API disabled (either by configuration or because the user is not an admin).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    ServerError:
      description: Server error.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

paths:

  # ── System ───────────────────────────────────────────────────────────────

  /:
    get:
      tags: [System]
      summary: Main webapp
      description: Serves the main webapp HTML. Redirects to `/login` if users exist and the request is unauthenticated.
      security: []
      responses:
        "200":
          description: HTML page.
          content:
            text/html:
              schema: { type: string }

  /admin:
    get:
      tags: [System]
      summary: Admin panel webapp
      description: Serves the admin panel HTML. Access-controlled the same way as `/`.
      security: []
      responses:
        "200":
          description: HTML page.
          content:
            text/html:
              schema: { type: string }

  /api:
    get:
      tags: [System]
      summary: API version discovery
      description: Returns the server version and the list of available API versions.
      security: []
      responses:
        "200":
          description: Version info.
          content:
            application/json:
              schema:
                type: object
                properties:
                  server:
                    type: string
                    description: Server version (from package.json).
                  apiVersions:
                    type: array
                    items: { type: string }
              example:
                server: "6.4.2"
                apiVersions: ["1"]

  /api/v1/ping:
    get:
      tags: [System]
      summary: Bootstrap payload
      description: |
        Returns everything the webapp needs on load: the user's libraries, their playlists,
        transcode capabilities, and server-level flags. Called once after login.
      responses:
        "200":
          description: Bootstrap info.
          content:
            application/json:
              schema:
                type: object
                properties:
                  vpaths:
                    type: array
                    items: { type: string }
                  playlists:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                  transcode:
                    oneOf:
                      - type: boolean
                        enum: [false]
                      - type: object
                        properties:
                          defaultCodec: { type: string }
                          defaultBitrate: { type: string }
                  noMkdir: { type: boolean }
                  noUpload: { type: boolean }
                  noFileModify: { type: boolean }
                  supportedAudioFiles:
                    type: object
                    additionalProperties: { type: boolean }
                  vpathMetaData:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        type: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ── Auth ─────────────────────────────────────────────────────────────────

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Log in
      description: |
        Authenticates with username + password. On success returns a JWT token and sets it as
        an `x-access-token` cookie with a 5-year max age. On failure, the response is delayed
        by 800ms to slow down brute-force attempts.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        "200":
          description: Authenticated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string, description: "JWT." }
                  vpaths:
                    type: array
                    items: { type: string }
        "401":
          description: Login failed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # ── Library ──────────────────────────────────────────────────────────────

  /api/v1/db/status:
    get:
      tags: [Library]
      summary: Library status
      description: Total track count across the user's accessible libraries and whether a scan is currently running.
      responses:
        "200":
          description: Status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalFileCount: { type: integer }
                  locked:
                    type: boolean
                    description: True while a scan is in progress.
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/db/metadata:
    post:
      tags: [Library]
      summary: Get metadata for a single track
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filepath]
              properties:
                filepath:
                  type: string
                  description: Virtual path.
      responses:
        "200":
          description: Metadata for the requested file.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Metadata" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/db/metadata/batch:
    post:
      tags: [Library]
      summary: Get metadata for multiple tracks
      description: Request body is a bare JSON array of virtual paths.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { type: string }
      responses:
        "200":
          description: Map of filepath → metadata.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: { $ref: "#/components/schemas/Metadata" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/db/artists:
    get: &artistsOp
      tags: [Library]
      summary: List all artists
      description: Unique artist names from the user's accessible libraries, case-insensitive sort.
      responses:
        "200":
          description: Artists.
          content:
            application/json:
              schema:
                type: object
                properties:
                  artists:
                    type: array
                    items: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      <<: *artistsOp
      requestBody:
        description: Optional `ignoreVPaths` filter.
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IgnoreVPaths" }

  /api/v1/db/artists-albums:
    post:
      tags: [Library]
      summary: List one artist's albums
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [artist]
                  properties:
                    artist: { type: string }
                - { $ref: "#/components/schemas/IgnoreVPaths" }
      responses:
        "200":
          description: Albums.
          content:
            application/json:
              schema:
                type: object
                properties:
                  albums:
                    type: array
                    items: { $ref: "#/components/schemas/Album" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/db/artists-albums-multi:
    post:
      tags: [Library]
      summary: List albums across several artists
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [artists]
              properties:
                artists:
                  type: array
                  items: { type: string }
      responses:
        "200":
          description: Albums.
          content:
            application/json:
              schema:
                type: object
                properties:
                  albums:
                    type: array
                    items: { $ref: "#/components/schemas/Album" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/db/albums:
    get: &albumsOp
      tags: [Library]
      summary: List all albums
      responses:
        "200":
          description: Albums.
          content:
            application/json:
              schema:
                type: object
                properties:
                  albums:
                    type: array
                    items: { $ref: "#/components/schemas/Album" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      <<: *albumsOp
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IgnoreVPaths" }

  /api/v1/db/album-songs:
    post:
      tags: [Library]
      summary: List tracks in an album
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [album]
                  properties:
                    album: { type: string }
                    artist: { type: string }
                    year: { type: integer }
                - { $ref: "#/components/schemas/IgnoreVPaths" }
      responses:
        "200":
          description: Tracks.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Metadata" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/db/genres:
    get: &genresOp
      tags: [Library]
      summary: List all genres
      responses:
        "200":
          description: Genres.
          content:
            application/json:
              schema:
                type: object
                properties:
                  genres:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        track_count: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      <<: *genresOp
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IgnoreVPaths" }

  /api/v1/db/genre-songs:
    post:
      tags: [Library]
      summary: List tracks in a genre
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [genre]
                  properties:
                    genre: { type: string }
                - { $ref: "#/components/schemas/IgnoreVPaths" }
      responses:
        "200":
          description: Tracks.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Metadata" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/db/genre-groups:
    get:
      tags: [Library]
      summary: Genre groups (Velvet)
      description: Alternative genre listing used by the Velvet UI.
      responses:
        "200":
          description: Genres with counts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  genres:
                    type: array
                    items:
                      type: object
                      properties:
                        genre: { type: string }
                        count: { type: integer }
                  groups: { type: object, nullable: true }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/db/genre/albums:
    post:
      tags: [Library]
      summary: Albums in a genre (Velvet)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [genre]
              properties:
                genre: { type: string }
      responses:
        "200":
          description: Albums.
          content:
            application/json:
              schema:
                type: object
                properties:
                  albums:
                    type: array
                    items: { $ref: "#/components/schemas/Album" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/db/genre/songs:
    post:
      tags: [Library]
      summary: Songs in a genre (Velvet)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [genre]
              properties:
                genre: { type: string }
      responses:
        "200":
          description: Tracks.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Metadata" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/db/decades:
    get:
      tags: [Library]
      summary: List decades (Velvet)
      responses:
        "200":
          description: Decades with counts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  decades:
                    type: array
                    items:
                      type: object
                      properties:
                        decade: { type: integer }
                        cnt: { type: integer }
                        albums: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/db/decade/albums:
    post:
      tags: [Library]
      summary: Albums in a decade (Velvet)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decade]
              properties:
                decade: { type: integer }
      responses:
        "200":
          description: Albums.
          content:
            application/json:
