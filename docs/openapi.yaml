      responses:
        "200":
          description: Subsonic mode + port.
          content:
            application/json:
              schema:
                type: object
                properties:
                  mode: { type: string, enum: [disabled, same-port, separate-port] }
                  port: { type: integer }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/subsonic/mode:
    post:
      tags: [Admin - Subsonic]
      summary: Change Subsonic mode (hot-reload)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode: { type: string, enum: [disabled, same-port, separate-port] }
                port: { type: integer, description: "Only required for separate-port." }
      responses:
        "200": { description: Updated. Server reboots to apply. }
        "403": { description: Validation error. }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/subsonic/stats:
    get:
      tags: [Admin - Subsonic]
      summary: Implemented methods, now-playing, lyrics-cache stats
      responses:
        "200":
          description: Stats for the admin panel card.
          content:
            application/json:
              schema:
                type: object
                properties:
                  methodsImplemented: { type: integer }
                  methods:
                    type: array
                    items: { type: string }
                  methodStatuses:
                    type: array
                    items:
                      type: object
                      properties:
                        name:   { type: string }
                        status: { type: string, enum: [full, stub] }
                  fullCount: { type: integer }
                  stubCount: { type: integer }
                  nowPlaying:
                    type: array
                    items:
                      type: object
                      properties:
                        username: { type: string }
                        trackId:  { type: integer }
                        title:    { type: string, nullable: true }
                        artist:   { type: string, nullable: true }
                        album:    { type: string, nullable: true }
                        sinceMs:  { type: integer }
                  lyrics:
                    type: object
                    description: LRCLib cache state + toggles.
                    properties:
                      lrclibEnabled:       { type: boolean }
                      writeSidecarEnabled: { type: boolean }
                      cache:
                        type: object
                        properties:
                          hit:     { type: integer }
                          miss:    { type: integer }
                          error:   { type: integer }
                          pending: { type: integer }
                          other:   { type: integer }
                          total:   { type: integer }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/subsonic/test:
    get:
      tags: [Admin - Subsonic]
      summary: Ping self via the configured Subsonic endpoint
      description: |
        Mints a throwaway API key, hits `/rest/ping` over HTTP, revokes the
        key, returns the round-trip result. Useful for the "test connection"
        button in the admin panel.
      responses:
        "200":
          description: Result of the probe.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:             { type: boolean }
                  latencyMs:      { type: integer }
                  serverVersion:  { type: string }
                  reason:         { type: string, description: "Only on failure." }
                  url:            { type: string }

  /api/v1/admin/subsonic/jukebox:
    get:
      tags: [Admin - Subsonic]
      summary: Live jukebox status (Rust audio backend)
      description: |
        Proxies to the bundled rust-server-audio process for its `/status` and
        `/queue` endpoints. Returns `{available:false, reason}` if the
        backend isn't running (autoBootServerAudio disabled or boot failed).
      responses:
        "200":
          description: Status snapshot.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [available]
                    properties:
                      available: { type: boolean, enum: [false] }
                      reason:    { type: string }
                  - type: object
                    required: [available]
                    properties:
                      available:   { type: boolean, enum: [true] }
                      playing:     { type: boolean }
                      paused:      { type: boolean }
                      position:    { type: number, description: "Seconds." }
                      duration:    { type: number, description: "Seconds." }
                      volume:      { type: number, minimum: 0, maximum: 1 }
                      currentFile: { type: string }
                      queueLength: { type: integer }
                      queueIndex:  { type: integer }
                      shuffle:     { type: boolean }
                      loopMode:    { type: string, enum: [none, one, all] }

  /api/v1/admin/subsonic/token-auth-attempts:
    get:
      tags: [Admin - Subsonic]
      summary: Recent token-auth rejects
      description: |
        mStream stores PBKDF2 hashes so can't support Subsonic token auth
        (`t=md5(password+salt)`). Clients that try it get an explicit error;
        each attempt is logged to a ring buffer (process-local, max 50) so
        the admin can see "DSub at 10.0.0.5 keeps trying, mint them a key."
      responses:
        "200":
          description: Recent attempts, most recent first.
          content:
            application/json:
              schema:
                type: object
                properties:
                  attempts:
                    type: array
                    items:
                      type: object
                      properties:
                        username: { type: string, nullable: true }
                        client:   { type: string, nullable: true }
                        at:       { type: integer, description: ms epoch. }
                        ua:       { type: string, nullable: true }
    delete:
      tags: [Admin - Subsonic]
      summary: Clear the token-auth-attempts ring buffer
      responses:
        "200": { description: Cleared. }

  /api/v1/admin/subsonic/mint-key:
    post:
      tags: [Admin - Subsonic]
      summary: Create a Subsonic API key on behalf of another user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, name]
              properties:
                username: { type: string }
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                  description: Key label. Required; distinguishes multiple keys on the same user.
      responses:
        "200":
          description: The freshly-minted key (view-once).
          content:
            application/json:
              schema:
                type: object
                required: [key, name, username]
                properties:
                  key:      { type: string }
                  username: { type: string }
                  name:     { type: string }
        "404": { description: User not found. }
        "403": { description: Validation error (missing `username` or `name`). }

  /api/v1/admin/users/subsonic-password:
    post:
      tags: [Admin - Subsonic]
      summary: Overwrite a user's password (admin-driven password reset for Subsonic clients)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string, minLength: 1 }
      responses:
        "200": { description: Password updated. }

  /api/v1/admin/subsonic/lyrics-cache/purge:
    post:
      tags: [Admin - Subsonic]
      summary: Purge the lyrics_cache table
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  enum: [full, retry]
                  default: full
                  description: |
                    `full` drops every row. `retry` drops only `error` and
                    `pending` rows (keeps hits) — use after a network outage.
      responses:
        "200":
          description: Count of rows deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  removed: { type: integer }
                  mode:    { type: string }
        "403": { description: Validation error (invalid mode). }

  /api/v1/admin/subsonic/lyrics-cache/enabled:
    post:
      tags: [Admin - Subsonic]
      summary: Toggle LRCLib external-lookup fallback
      description: |
        When disabled, no new LRCLib fetches fire (existing cached hits keep
        serving — clear them via `/purge`). On the enabled→disabled edge
        queued-but-not-yet-running jobs are cancelled; in-flight requests
        complete but their result is dropped.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
      responses:
        "200":
          description: Toggle persisted; cache rows untouched.
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:       { type: boolean }
                  cancelledJobs: { type: integer, description: Queue drops when disabling. }

  /api/v1/admin/subsonic/lyrics-cache/write-sidecar:
    post:
      tags: [Admin - Subsonic]
      summary: Toggle LRCLib→sidecar write-back
      description: |
        When enabled, a successful LRCLib hit ALSO writes a sibling `.lrc`
        (synced) or `.txt` (plain) next to the audio file. Never clobbers an
        existing sibling. Silent no-op on read-only filesystems.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
      responses:
        "200":
          description: Toggle persisted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  writeSidecar: { type: boolean }

  # ── Subsonic REST API (handled under /rest/*) ────────────────────────────
  # The Subsonic API uses its own auth scheme (u/p, u/t/s, or apiKey) and
  # its own envelope format, so the 61 methods aren't enumerated as mStream
  # JSON paths here. Spec:
  #   https://opensubsonic.netlify.app/docs/endpoints/
  # See the admin panel "API Surface" card for the live list of implemented
  # methods with FULL/STUB status per method.

  /rest/{method}:
    get:
      tags: [Subsonic API]
      summary: Subsonic / OpenSubsonic dispatch
      description: |
        Dispatch on `method` (e.g. `ping`, `getArtists`, `getAlbumList2`,
        `stream`, `getLyricsBySongId`). Full list at
        <https://opensubsonic.netlify.app/docs/endpoints/>.

        **Auth is Subsonic-native, NOT mStream JWT**: pass `u=<username>` and
        one of (`p=<plaintext|enc:HEX>`, `t=<md5(pw+salt)>` + `s=<salt>`, or
        `apiKey=<opaque>`). JWT cookies are ignored on `/rest/*`.

        `.view` suffix (e.g. `/rest/ping.view`) is also accepted for
        pre-1.4.0 compatibility.
      parameters:
        - name: method
          in: path
          required: true
          schema: { type: string }
        - name: f
          in: query
          schema: { type: string, enum: [json, xml, jsonp], default: xml }
        - name: u
          in: query
          schema: { type: string }
        - name: p
          in: query
          schema: { type: string }
        - name: t
          in: query
          schema: { type: string }
        - name: s
          in: query
          schema: { type: string }
        - name: apiKey
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Subsonic envelope (see `subsonic-response` schema in upstream spec).
      security: []   # uses its own auth params
    post:
      tags: [Subsonic API]
      summary: Same as GET (Subsonic allows either method on every endpoint)
      parameters:
        - name: method
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Subsonic envelope. }
      security: []

