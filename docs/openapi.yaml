      summary: Rename a playlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldName, newName]
              properties:
                oldName: { type: string }
                newName: { type: string }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "400":
          description: New name already in use.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/playlist/getall:
    get:
      tags: [Playlists]
      summary: List the user's playlists
      responses:
        "200":
          description: Playlists.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ── Smart Playlists ──────────────────────────────────────────────────────

  /api/v1/smart-playlists:
    get:
      tags: [Smart Playlists]
      summary: List smart playlists (Velvet)
      responses:
        "200":
          description: Smart playlists.
          content:
            application/json:
              schema:
                type: object
                properties:
                  playlists:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        name: { type: string }
                        filters: { type: object }
                        sort: { type: string }
                        limit_n: { type: integer, nullable: true }
    post:
      tags: [Smart Playlists]
      summary: Create a smart playlist (Velvet)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                filters: { type: object }
                sort: { type: string }
                limit: { type: integer }
      responses:
        "200":
          description: Created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }

  /api/v1/smart-playlists/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    put:
      tags: [Smart Playlists]
      summary: Update a smart playlist (Velvet)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                filters: { type: object }
                sort: { type: string }
                limit: { type: integer }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
    delete:
      tags: [Smart Playlists]
      summary: Delete a smart playlist (Velvet)
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }

  /api/v1/smart-playlists/run:
    post:
      tags: [Smart Playlists]
      summary: Execute a smart-playlist query (Velvet)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filters]
              properties:
                filters: { type: object }
                sort: { type: string }
                limit: { type: integer }
      responses:
        "200":
          description: Matching tracks.
          content:
            application/json:
              schema:
                type: object
                properties:
                  songs:
                    type: array
                    items: { $ref: "#/components/schemas/Metadata" }

  /api/v1/smart-playlists/count:
    post:
      tags: [Smart Playlists]
      summary: Count tracks matching a smart-playlist query (Velvet)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filters]
              properties:
                filters: { type: object }
      responses:
        "200":
          description: Count.
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer }

  # ── Shared Playlists ─────────────────────────────────────────────────────

  /shared/{playlistId}:
    get:
      tags: [Shared Playlists]
      summary: Shared-playlist viewer page
      description: Public HTML page for viewing a shared playlist.
      security: []
      parameters:
        - name: playlistId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: HTML.
          content:
            text/html:
              schema: { type: string }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/shared/{playlistId}:
    get:
      tags: [Shared Playlists]
      summary: Fetch shared-playlist data
      description: Returns the playlist contents and a restricted JWT that can only play those tracks.
      security: []
      parameters:
        - name: playlistId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Playlist data and token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  playlist:
                    type: array
                    items: { type: string }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/share:
    post:
      tags: [Shared Playlists]
      summary: Create a shareable link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [playlist]
              properties:
                playlist:
                  type: array
                  items: { type: string }
                time:
                  type: integer
                  description: Expiry in days. Omit for an eternal link.
      responses:
        "200":
          description: Share info.
          content:
            application/json:
              schema:
                type: object
                properties:
                  playlistId: { type: string }
                  playlist:
                    type: array
                    items: { type: string }
                  user: { type: string }
                  expires:
                    type: integer
                    nullable: true
                  token: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/share/list:
    get:
      tags: [Shared Playlists]
      summary: List the user's shared playlists (Velvet)
      responses:
        "200":
          description: Share records.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    playlistId: { type: string }
                    songCount: { type: integer }
                    expires:
                      type: integer
                      nullable: true
                    createdAt: { type: string }

  /api/v1/share/{id}:
    delete:
      tags: [Shared Playlists]
      summary: Delete a shared playlist (Velvet)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }

  # ── File Explorer ────────────────────────────────────────────────────────

  /api/v1/file-explorer:
    post:
      tags: [File Explorer]
      summary: Browse a directory within the user's libraries
      description: Pass an empty string or `~` to list vpaths / home.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [directory]
              properties:
                directory:
                  type: string
                sort:
                  type: boolean
                  default: true
                pullMetadata:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Directory listing.
          content:
            application/json:
              schema:
                type: object
                properties:
                  path: { type: string }
                  directories: { type: array, items: { type: object } }
                  files: { type: array, items: { type: object } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/file-explorer/recursive:
    post:
      tags: [File Explorer]
      summary: Recursively list all audio files under a directory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [directory]
              properties:
                directory: { type: string }
      responses:
        "200":
          description: Array of virtual paths.
          content:
            application/json:
              schema:
                type: array
                items: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/file-explorer/mkdir:
    post:
      tags: [File Explorer]
      summary: Create a directory
      description: Requires per-user mkdir permission. Recursive.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [directory]
              properties:
                directory: { type: string }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/file-explorer/upload:
    post:
      tags: [File Explorer]
      summary: Upload a file
      description: |
        Multipart form upload via busboy. Target directory goes in the `data-location` header.
        Requires per-user upload permission. Filenames are sanitized to prevent path traversal.
      parameters:
        - name: data-location
          in: header
          required: true
          schema: { type: string }
          description: Target directory as virtual path.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/file-explorer/m3u:
    post:
      tags: [File Explorer]
      summary: Parse an M3U playlist file
      description: Returns resolved paths for each entry, sanitized against directory traversal.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path: { type: string }
      responses:
        "200":
          description: Parsed entries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        type: { type: string }
                        name: { type: string }
                        path: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ── Download ─────────────────────────────────────────────────────────────

  /api/v1/download/m3u:
    post:
      tags: [Download]
      summary: Download an M3U playlist + all its tracks as a ZIP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path: { type: string }
      responses:
        "200":
          description: ZIP archive.
          content:
            application/zip:
              schema: { type: string, format: binary }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/download/directory:
    post:
      tags: [Download]
      summary: Download a directory as a ZIP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [directory]
              properties:
                directory: { type: string }
      responses:
        "200":
          description: ZIP archive.
          content:
            application/zip:
              schema: { type: string, format: binary }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/download/shared:
    get:
      tags: [Download]
      summary: Download all files in a shared playlist
      description: Requires a shared-playlist token (issued by `GET /api/v1/shared/{playlistId}`).
      responses:
        "200":
          description: ZIP archive.
          content:
            application/zip:
              schema: { type: string, format: binary }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/download/zip:
    post:
      tags: [Download]
      summary: Download an arbitrary list of files as a ZIP
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [fileArray]
              properties:
                fileArray:
                  type: string
                  description: JSON-stringified array of virtual paths.
      responses:
        "200":
          description: ZIP archive.
          content:
            application/zip:
              schema: { type: string, format: binary }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ── Transcode ────────────────────────────────────────────────────────────

  /transcode/{filepath}:
    get:
      tags: [Transcode]
      summary: Transcode audio on the fly
      description: |
        Streams a transcoded version of the audio file. Streaming begins before transcoding
        finishes. Results are cached for the song's duration plus 2 minutes.
      parameters:
        - name: filepath
          in: path
          required: true
          description: Virtual path (may contain `/`).
          schema: { type: string }
        - name: codec
          in: query
          schema:
            type: string
            enum: [mp3, opus, aac]
        - name: bitrate
          in: query
          schema:
            type: string
            enum: ["64k", "96k", "128k", "192k"]
      responses:
        "200":
          description: Transcoded audio stream.
          headers:
            Content-Type: { schema: { type: string } }
            Content-Length: { schema: { type: integer } }
            Accept-Ranges: { schema: { type: string } }
          content:
            audio/*:
              schema: { type: string, format: binary }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "503":
          description: ffmpeg not available.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # ── Album Art ────────────────────────────────────────────────────────────

  /album-art/{file}:
    get:
      tags: [Album Art]
      summary: Serve a cached album-art file
      security: []
      parameters:
        - name: file
          in: path
          required: true
          schema: { type: string }
        - name: compress
          in: query
          description: '`zl` = large thumbnail, `zs` = small thumbnail. Omit for full-size.'
          schema:
            type: string
            enum: [zl, zs]
      responses:
        "200":
          description: Image.
          content:
            image/*:
              schema: { type: string, format: binary }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/album-art/search:
    post:
      tags: [Album Art]
      summary: Search external services for album art
      description: Queries MusicBrainz, iTunes, and Deezer.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                artist: { type: string }
                album: { type: string }
      responses:
        "200":
          description: Search results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        service: { type: string, enum: [musicbrainz, itunes, deezer] }
                        url: { type: string }
                        label: { type: string }
                  ffmpegAvailable: { type: boolean }

  /api/v1/album-art/set-from-url:
    post:
      tags: [Album Art]
      summary: Download album art from a URL and apply it
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filepath, url]
              properties:
                filepath: { type: string }
                url: { type: string, format: uri }
                writeToFolder: { type: boolean, default: false }
                writeToFile:
                  type: boolean
                  default: false
                  description: Embed into the ID3 tag (needs ffmpeg and write permission).
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, enum: [true] }
        "400": { $ref: "#/components/responses/Forbidden" }

  /api/v1/album-art/upload:
    post:
      tags: [Album Art]
      summary: Upload album art as base64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filepath, image]
              properties:
                filepath: { type: string }
                image:
                  type: string
                  description: Base64-encoded image.
                writeToFolder: { type: boolean, default: false }
                writeToFile: { type: boolean, default: false }
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, enum: [true] }

  /api/v1/album-art/ffmpeg-status:
    get:
      tags: [Album Art]
      summary: Check ffmpeg availability
      responses:
        "200":
          description: Availability.
          content:
            application/json:
              schema:
                type: object
                properties:
                  available: { type: boolean }

  # ── Waveform ─────────────────────────────────────────────────────────────

  /api/v1/db/waveform:
    get:
      tags: [Waveform]
      summary: Get waveform peaks for a track
      description: 800 bars, 0–255 each. Generated on demand and cached.
      parameters:
        - name: filepath
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Waveform data.
          content:
            application/json:
              schema:
                type: object
                properties:
                  waveform:
                    type: array
                    items: { type: integer, minimum: 0, maximum: 255 }
                    minItems: 800
                    maxItems: 800
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ── Lyrics ──────────────────────────────────────────────────────────────

  /api/v1/lyrics:
    get:
      tags: [Lyrics]
      summary: Resolve lyrics for a track (Velvet UI shape)
      description: |
        Returns lyrics in the shape the Velvet UI expects. Lookup precedence
        (all scoped to the caller's accessible libraries):

        1. `filepath` query param — exact match on `tracks.filepath`
           (or `<vpath>/<relpath>` joined form).
        2. `artist` + `title` — case-insensitive substring match.
        3. Filename fallback: if `title` looks like `"Artist - Song.mp3"`
           we strip the extension and split on ` - `.
        4. Nothing matched → `{ notFound: true }`.

        Data comes from (in order): embedded tag columns, LRCLib cache hit,
        or empty (with a background fetch enqueued if LRCLib is enabled).
        See `getLyricsBySongId` on the Subsonic API for the ms-offset variant.
      parameters:
        - name: filepath
          in: query
          schema: { type: string }
          description: "`<vpath>/<relpath>` or just `<relpath>`."
        - name: artist
          in: query
          schema: { type: string }
        - name: title
          in: query
          schema: { type: string }
        - name: duration
          in: query
          schema: { type: integer, minimum: 0 }
          description: Seconds. Used to pick the exact-match LRCLib result if needed.
      responses:
        "200":
          description: Lyrics (synced or plain) or a `notFound` marker.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [synced, lines]
                    properties:
                      synced: { type: boolean, enum: [true] }
                      lines:
                        type: array
                        items:
                          type: object
                          required: [time, text]
                          properties:
                            time: { type: number, description: "Seconds (float)." }
                            text: { type: string }
                  - type: object
                    required: [synced, lines]
                    properties:
                      synced: { type: boolean, enum: [false] }
                      lines:
                        type: array
                        items:
                          type: object
                          required: [time, text]
                          properties:
                            time:
                              type: number
                              nullable: true
                              description: "Always null on the unsynced variant."
                            text: { type: string }
                  - type: object
                    required: [notFound]
                    properties:
                      notFound: { type: boolean, enum: [true] }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ── User API Keys ───────────────────────────────────────────────────────

  /api/v1/user/api-keys:
    get:
      tags: [User API Keys]
      summary: List the caller's own Subsonic API keys
      description: |
        Returns an array (not a wrapped object) of keys the caller has
        minted. Key strings are never returned — those are view-once at
        creation time; after that only id/name/timestamps are visible.
      responses:
        "200":
          description: Keys minted by this user. Key values NOT returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:         { type: integer }
                    name:       { type: string }
                    created_at: { type: string, format: date-time }
                    last_used:  { type: string, format: date-time, nullable: true }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [User API Keys]
      summary: Mint a new Subsonic API key for the caller
      description: |
        The key value is returned exactly once in this response — after this
        request completes, the server only stores a reference and the key
        cannot be re-displayed. Clients that can't send a JWT cookie (DSub,
        Ultrasonic, Substreamer, etc.) paste the key into their
        `password`/`apiKey` field.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                  description: Free-form label so the user can tell keys apart. Required.
      responses:
        "200":
          description: One-time view of the freshly-minted key.
          content:
            application/json:
              schema:
                type: object
                required: [key, name]
                properties:
                  key:  { type: string }
                  name: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Validation error (missing/blank `name`). }

  /api/v1/user/api-keys/{id}:
    delete:
      tags: [User API Keys]
      summary: Revoke a Subsonic API key
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Key revoked. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { description: No such key (or not owned by caller). }

  # ── Cue Points ───────────────────────────────────────────────────────────

  /api/v1/db/cuepoints:
    get:
      tags: [Cue Points]
      summary: List cue points for a track (Velvet)
      parameters:
        - name: fp
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Cue points.
          content:
            application/json:
              schema:
                type: object
                properties:
                  cuepoints:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        no: { type: integer }
                        title: { type: string, nullable: true }
                        t: { type: number, description: "Position in seconds." }
                        color: { type: string, nullable: true }
    post:
      tags: [Cue Points]
      summary: Create a cue point (Velvet)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filepath, position]
              properties:
                filepath: { type: string }
                position: { type: number, description: "Seconds from start." }
                label: { type: string }
                color: { type: string }
      responses:
        "200":
          description: Created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }

  /api/v1/db/cuepoints/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    put:
      tags: [Cue Points]
      summary: Update a cue point (Velvet)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                position: { type: number }
                label: { type: string }
                color: { type: string }
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, enum: [true] }
    delete:
      tags: [Cue Points]
      summary: Delete a cue point (Velvet)
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, enum: [true] }

  # ── User Settings ────────────────────────────────────────────────────────

  /api/v1/user/settings:
    get:
      tags: [User Settings]
      summary: Get the user's UI preferences (Velvet)
      responses:
        "200":
          description: Prefs and optional queue.
          content:
            application/json:
              schema:
                type: object
                properties:
                  prefs:
                    type: object
                    additionalProperties: { type: string }
