      summary: Pause playback
      responses: { "200": { description: Proxied response from the Rust audio server. } }
  /api/v1/server-playback/resume:
    post:
      tags: [Server Playback]
      summary: Resume playback
      responses: { "200": { description: Proxied response. } }
  /api/v1/server-playback/stop:
    post:
      tags: [Server Playback]
      summary: Stop and clear queue
      responses: { "200": { description: Proxied response. } }
  /api/v1/server-playback/next:
    post:
      tags: [Server Playback]
      summary: Next track
      responses: { "200": { description: Proxied response. } }
  /api/v1/server-playback/previous:
    post:
      tags: [Server Playback]
      summary: Previous track
      responses: { "200": { description: Proxied response. } }
  /api/v1/server-playback/loop:
