openapi: 3.0.3
info:
  title: mStream API
  version: "1"
  description: |
    REST API for the [mStream](https://github.com/IrosTheBeggar/mStream) music streaming server.

    ## Authentication

    Most endpoints require a JWT bearer token. Tokens are issued by `POST /api/v1/auth/login` and
    can be supplied via any of (checked in order):

    1. Request body field `token`
    2. Query parameter `token`
    3. HTTP header `x-access-token`
    4. Cookie `x-access-token`

    ### Public mode

    If no users exist in the database, all requests are authenticated as a virtual public user with
    full library access — no token required. This is the default for fresh installs.

    ### Special tokens

    - **Admin tokens** have `admin: true` in the payload and are required for every `/api/v1/admin/*` endpoint.
    - **Jukebox tokens** (`jukebox: true`) are short-lived and bound to an active remote-control session.
    - **Shared-playlist tokens** (`shareToken: true`) restrict file access to the tracks in one specific shared playlist.
    - **Federation invite tokens** (`invite: true`) can only call `POST /api/v1/federation/invite/exchange`.

    ## Errors

    Errors use the shape `{ "error": "<message>" }`. Status codes:

    | Code | Meaning |
    |------|---------|
    | 400  | Bad request (invalid input) |
    | 401  | Unauthenticated |
    | 403  | Forbidden (Joi validation error, missing permission) |
    | 404  | Resource not found |
    | 405  | Admin API locked |
    | 500  | Server error |
    | 503  | External dependency unavailable (ffmpeg, rust audio server) |

    ## Virtual paths (vpaths)

    Libraries are mounted under named vpaths (e.g. `music`, `audiobooks`). Filepaths in request/response
    bodies are `<vpath>/<relative/path/within/library>`. The server translates these to absolute paths
    internally and enforces per-user library access on every request.
  license:
    name: GPL-3.0
    url: https://www.gnu.org/licenses/gpl-3.0.en.html

servers:
  - url: http://localhost:3000
    description: Default local server
  - url: "{scheme}://{host}:{port}"
    description: Self-hosted instance
    variables:
      scheme:
        enum: [http, https]
        default: http
      host:
        default: localhost
      port:
        default: "3000"

tags:
  - name: Auth
    description: Login and token issuance.
  - name: System
    description: Server bootstrap, API discovery.
  - name: Library
    description: Artists, albums, genres, tracks — browsing the music database.
  - name: Search
    description: Full-text search across the library.
  - name: Stats
    description: Play counts, ratings, recently-played, Wrapped.
  - name: Playlists
    description: Saved playlists (create, load, modify).
  - name: Smart Playlists
    description: Rule-based dynamic playlists (Velvet UI).
  - name: Shared Playlists
    description: Public shareable playlist links.
  - name: File Explorer
    description: Directory browsing, upload, M3U parsing.
  - name: Download
    description: Multi-file ZIP downloads.
  - name: Transcode
    description: On-the-fly audio transcoding via ffmpeg.
  - name: Album Art
    description: Album art search, upload, serving.
  - name: Waveform
    description: Per-track waveform data for the progress bar.
  - name: Lyrics
    description: |
      Per-track lyrics — embedded tag (USLT / Vorbis LYRICS / MP4 ©lyr / APE Lyrics)
      or sibling `.lrc` / `.txt` sidecar files. LRC-format content is parsed into
      line-timed entries. Optional LRCLib external fallback (opt-in via admin toggle)
      populates a cache table for tracks with no local lyrics. Subsonic clients get
      `/rest/getLyrics` + `/rest/getLyricsBySongId`; the Velvet UI uses this endpoint.
  - name: Subsonic API
    description: |
      Subsonic 1.16.1 + OpenSubsonic REST API served at `/rest/<method>` (and the
      historical `/rest/<method>.view` alias). 61 methods implemented — full spec
      at <https://opensubsonic.netlify.app/docs/>. See the "Show method list" card
      in the admin panel for the full list including per-method FULL/STUB status.
      Auth uses Subsonic's own credential scheme (`u/p`, `u/t/s`, or `apiKey`) —
      NOT mStream's JWT — so these endpoints are not enumerated individually here.
  - name: User API Keys
    description: |
      Per-user API keys for Subsonic clients that can't send a JWT cookie
      (DSub, Ultrasonic, Substreamer, etc.). Mint via the mStream UI; the key
      becomes the `apiKey` query param on every `/rest/*` call.
  - name: Cue Points
    description: Bookmarks/markers within tracks.
  - name: User Settings
    description: Client-persisted preferences and queue state.
  - name: Scrobbler - Last.fm
    description: Last.fm scrobbling integration.
  - name: Scrobbler - ListenBrainz
    description: ListenBrainz scrobbling integration.
  - name: Discogs
    description: Discogs lookup for album art and metadata.
  - name: Server Playback
    description: Proxy to the bundled Rust audio player.
  - name: Jukebox
    description: Remote-control mode via WebSocket-backed REST.
  - name: YouTube DL
    description: Download YouTube audio into the library.
  - name: Admin - Config
    description: Server-level settings (address, port, UI, secret).
  - name: Admin - Scanner
    description: Scanner parameters and manual scan triggers.
  - name: Admin - Users
    description: User CRUD and permission management.
  - name: Admin - Libraries
    description: Library (vpath) CRUD.
  - name: Admin - Transcode
    description: Transcode defaults and ffmpeg setup.
  - name: Admin - DLNA
    description: DLNA server configuration.
  - name: Admin - SSL
    description: SSL certificate management.
  - name: Admin - Logs
    description: Server log download.
  - name: Admin - Discogs
    description: Discogs API credentials.
  - name: Admin - Shared
    description: Shared-playlist administration.
  - name: Admin - File Explorer
    description: Unrestricted filesystem browsing (admin only).
  - name: Admin - Subsonic
    description: |
      Subsonic-specific admin widgets: mode toggle (disabled / same-port /
      separate-port), live now-playing strip, jukebox status, token-auth
      attempts log, per-user API-key minting, lyrics-cache (LRCLib) config +
      stats.
  - name: Federation
    description: Mesh-sync between mStream instances via Syncthing.
  - name: Torrent
    description: |
      User-facing torrent feature. Operators upload `.torrent` files or
      paste magnet URIs; mStream hands them off to the configured client
      (Transmission, qBittorrent, or Deluge). Completed downloads land
      inside an mStream library and get picked up by a targeted scan.

      Per-user `allow_torrent` gating (when `enabledFor: 'whitelist'`)
      plus per-user vpath access checks every submission. Auto-detect
      runs a 3-tier metadata pipeline (name-parse → file-list heuristics
      → partial-byte tag fetch) so the player can pre-fill artist /
      album / year before submit.
  - name: Admin - Torrent
    description: |
      Admin-side torrent configuration. Picks the active backend
      (`disabled` / `transmission` / `qbittorrent` / `deluge`), saves
      per-client login credentials, manages the per-vpath path-mapping
      cache, maintains per-vpath path templates the player uses to
      pre-fill destination paths, lists daemon-side torrents, and
      removes mStream-added torrents from the daemon (files on disk
      kept).

security:
  - bearerAuth: []
  - cookieAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Pass the JWT in the `x-access-token` header. Despite the OpenAPI "bearer" label,
        the value does NOT include a `Bearer ` prefix — it's the raw token.
    cookieAuth:
      type: apiKey
      in: cookie
      name: x-access-token

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message.
      example:
        error: Authentication Error

    Empty:
      type: object
      description: Empty success response — the operation completed with no additional data.
      example: {}

    Metadata:
      type: object
      description: Shared track metadata shape used across nearly every library endpoint.
      properties:
        filepath:
          type: string
          description: Virtual path (`<vpath>/<rel>`).
        metadata:
          type: object
          properties:
            title:
              type: string
              nullable: true
            artist:
              type: string
              nullable: true
            album:
              type: string
              nullable: true
            track:
              type: integer
              nullable: true
            disk:
              type: integer
              nullable: true
            year:
              type: integer
              nullable: true
            hash:
              type: string
              nullable: true
              description: Content hash (used as a stable ID across re-scans).
            album-art:
              type: string
              nullable: true
              description: Filename in the album-art cache directory. Serve via `GET /album-art/{file}`.
            rating:
              type: integer
              minimum: 0
              maximum: 10
              nullable: true
            play-count:
              type: integer
              nullable: true
            last-played:
              type: string
              format: date-time
              nullable: true
            replaygain-track:
              type: number
              nullable: true
              description: Track-level ReplayGain adjustment in dB.
            bpm:
              type: integer
              nullable: true
              description: |
                Beats-per-minute, range-validated 20..300 at scan time
                (V32). NULL when the file's `TBPM` / Vorbis `BPM` /
                MP4 `tmpo` tag is absent or out of range. Drives the
                webapp Auto-DJ BPM-continuity feature.
            musical-key:
              type: string
              nullable: true
              description: |
                Musical key as stored in the file's tag (`TKEY` /
                `INITIALKEY` / Vorbis `KEY`), trimmed and capped at
                12 chars at scan time. Format varies by tagger —
                may be a raw key name ("A minor"), a Camelot code
                ("8A"), or an enharmonic spelling ("Am"). Clients
                that need canonicalisation should run the value
                through `toCamelot()` (see the velvet helper or the
                server-side `CAMELOT_TO_KEYS` map).

                Field name is kebab-case on the wire to match the
                other multi-word fields here (`album-art`,
                `play-count`, `last-played`, `replaygain-track`).
                The DB column name is `musical_key` (snake_case,
                SQL convention).
            bitrate:
              type: integer
              nullable: true
              description: |
                Audio bitrate in bits per second. (The Subsonic API reports
                this as kbps.) Populated by both scanners; null on rows
                scanned before that change until a force-rescan.
            format:
              type: string
              nullable: true
              description: Container / codec, e.g. `flac`, `mp3`, `opus`.
            duration:
              type: number
              nullable: true
              description: Track length in seconds.
            sample-rate:
              type: integer
              nullable: true
              description: |
                Sample rate in Hz (e.g. 44100, 96000). NULL on rows scanned
                before schema V16 until a force-rescan repopulates it. DB
                column `sample_rate`.
            channels:
              type: integer
              nullable: true
              description: |
                Channel count (e.g. 2 for stereo). NULL before schema V16
                until a force-rescan.
            bit-depth:
              type: integer
              nullable: true
              description: |
                Bits per sample (e.g. 16, 24). NULL before schema V16 until a
                force-rescan. DB column `bit_depth`.
            file-size:
              type: integer
              nullable: true
              description: |
                File size in bytes. DB column `file_size`. Populated by both
                scanners; null on rows scanned before that change until a
                force-rescan.
            audio-hash:
              type: string
              nullable: true
              description: |
                V14 audio-payload hash — the preferred stable track identity
                (survives tag edits, album-art changes, ReplayGain rewrites),
                unlike `hash` (whole-file MD5). DB column `audio_hash`.
            created-at:
              type: string
              nullable: true
              description: When the track row was first scanned (≈ date added to the library). DB column `created_at`.
            modified:
              type: integer
              nullable: true
              description: File modification time, epoch milliseconds. DB column `modified`.
            source:
              type: string
              nullable: true
              description: Provenance label from embedded tags (V36), e.g. `ytdl`. Null when no recognised marker is present.
            bpm-source:
              type: string
              nullable: true
              description: Where `bpm` came from (`tag` vs scanner analysis). DB column `bpm_source`.
            has-lyrics:
              type: boolean
              description: |
                True when the track has embedded or synced lyrics. The lyrics
                text itself is fetched via the dedicated lyrics endpoint, not
                inlined here.
            has-synced-lyrics:
              type: boolean
              description: True when the track has time-synced (LRC) lyrics.
            track-total:
              type: integer
              nullable: true
              description: Total tracks on the disc (the "of" in "track 3 of 12"), V43. Pairs with `track`. DB column `track_total`.
            disc-total:
              type: integer
              nullable: true
              description: Total disc count (the "of" in "disc 1 of 2"), V43. Pairs with `disk`. DB column `disc_total`.

    MetadataLite:
      type: object
      description: |
        The "lite" subset of the full track metadata, returned in large list
        responses (e.g. `/api/v1/db/search`) under the same `metadata` key.
        Carries the display / playback / Auto-DJ fields a client needs to
        render and play a row; the fidelity, diagnostic, identity, and stats
        fields (`bitrate`, `format`, `hash`, `audio-hash`, `play-count`,
        `sample-rate`, `created-at`, …) are omitted — fetch
        `GET`/`POST /api/v1/db/metadata` for the complete object. A strict
        subset of `Metadata.metadata`: same keys, same kebab-casing. (The
        lite-vs-full distinction will be named explicitly in the v2 API.)
      properties:
        title:
          type: string
          nullable: true
        artist:
          type: string
          nullable: true
        album:
          type: string
          nullable: true
        track:
          type: integer
          nullable: true
        disk:
          type: integer
          nullable: true
        year:
          type: integer
          nullable: true
        album-art:
          type: string
          nullable: true
          description: Filename in the album-art cache; serve via `GET /album-art/{file}`.
        duration:
          type: number
          nullable: true
          description: Track length in seconds.
        rating:
          type: integer
          minimum: 0
          maximum: 10
          nullable: true
        replaygain-track:
          type: number
          nullable: true
          description: Track-level ReplayGain adjustment in dB.
        bpm:
          type: integer
          nullable: true
        musical-key:
          type: string
          nullable: true
        genres:
          type: array
          items:
            type: string
          description: Genre names — always present, possibly empty.
        has-lyrics:
          type: boolean
        has-synced-lyrics:
          type: boolean

    Album:
      type: object
      properties:
        name:
          type: string
        artist:
          type: string
          nullable: true
        year:
          type: integer
          nullable: true
        album_art_file:
          type: string
          nullable: true

    Library:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          description: Virtual path (vpath).
        root_path:
          type: string
          description: Absolute filesystem path.
        type:
          type: string
          enum: [music, audio-books]

    User:
      type: object
      properties:
        admin:
          type: boolean
        vpaths:
          type: array
          items:
            type: string
        allowMkdir:
          type: boolean
        allowUpload:
          type: boolean
        allowFileModify:
          type: boolean

    IgnoreVPaths:
      type: object
      properties:
        ignoreVPaths:
          type: array
          items:
            type: string
          description: Libraries (vpaths) to exclude from the query.

    SearchArtistOrAlbumItem:
      type: object
      description: |
        One artist or album hit from `/api/v1/db/search`. The
        `filepath` field is always the literal boolean `false` on
        artist/album rows — used by clients as a sentinel that
        distinguishes "browseable group" results from individual
        tracks (which have a real `filepath` string).
      required: [name, album_art_file, filepath]
      properties:
        name:
          type: string
          description: Artist or album name.
        album_art_file:
          type: string
          nullable: true
          description: Filename of associated cover art, or `null` if none.
            Resolve via `/album-art/<file>`.
        filepath:
          type: boolean
          enum: [false]
          description: Always `false`. Sentinel value distinguishing this
            from a track-shaped result.

    SearchTrackItem:
      type: object
      description: |
        One track hit from `/api/v1/db/search`. Returned in the
        `title` array (when the track's title matched) and the
        `files` array (when the filepath matched).
      required: [name, album_art_file, filepath, metadata]
      properties:
        name:
          type: string
          description: |
            Display name. For title-matched tracks: `"<artist> - <title>"`
            when an artist is known, otherwise just the title. For
            filepath-matched tracks: the same library-prefixed path
            value as `filepath`.
        album_art_file:
          type: string
          nullable: true
          description: Filename of the track's cover art, or `null`.
        filepath:
          type: string
          description: Library-prefixed path (e.g. `"music/Artist/Album/01.flac"`).
            Use directly with `/media/<library>/<rest>` to stream.
        metadata:
          type: object
          nullable: true
          description: |
            The LITE subset of the track metadata (see `MetadataLite`) — the
            display / playback / Auto-DJ fields. Lets a client enqueue a search
            hit without a follow-up metadata round-trip; the heavy
            fidelity / diagnostic / stats fields are omitted, fetch
            `/api/v1/db/metadata` for the complete object. `null` only if the
            track row vanished between the match and the enrichment query. The
            legacy `name`/`album_art_file`/`filepath` fields above are kept
            alongside it, so this is a non-breaking addition.
          allOf:
            - $ref: "#/components/schemas/MetadataLite"

    SearchLyricsItem:
      type: object
      description: |
        One lyrics hit from `/api/v1/db/search` (the `lyrics` array) — a
        track whose stored lyrics matched. Same shape as SearchTrackItem
        plus a `snippet` excerpt showing the matching line.
      required: [name, album_art_file, filepath, metadata, snippet]
      properties:
        name:
          type: string
          description: '`"<artist> - <title>"` when an artist is known, else the title.'
        album_art_file:
          type: string
          nullable: true
          description: Filename of the track's cover art, or `null`.
        filepath:
          type: string
          description: Library-prefixed path. Use with `/media/<library>/<rest>` to stream.
        metadata:
          type: object
          nullable: true
          description: The LITE subset of the track metadata (see `MetadataLite` / SearchTrackItem.metadata).
          allOf:
            - $ref: "#/components/schemas/MetadataLite"
        snippet:
          type: string
          nullable: true
          description: |
            The matching lyric excerpt from FTS5 `snippet()` (the
            half-remembered line). `null` on the LIKE path (`basic`
            algorithm), which has no snippet support.

    ScanOptions:
      type: object
      properties:
        skipImg:
          type: boolean
        scanInterval:
          type: number
        bootScanDelay:
          type: number
        compressImage:
          type: boolean
        scanCommitInterval:
          type: integer
        autoAlbumArt:
          type: boolean
        autoAlbumArtMode:
          type: string
          enum: [missing, all]
          description: Default `missing` — only albums without a cover.
        autoAlbumArtWriteToFolder:
          type: boolean
          description: >
            Downloader writes fetched covers as cover.jpg into album
            folders (only when the fetch became the album's default).
            Default false. Distinct from albumArtWriteToFolder (manual flow).
        autoAlbumArtPerRun:
          type: integer
          minimum: 1
          maximum: 10000
          description: Albums attempted per downloader pass. Default 100.
        albumArtWriteToFolder:
          type: boolean
        albumArtWriteToFile:
          type: boolean
        albumArtServices:
          type: array
          items:
            type: string
            enum: [musicbrainz, itunes, deezer]
        analyzeBpm:
          type: boolean
          description: |
            DEPRECATED — accepted but currently a no-op. Scan-time
            BPM/key analysis was removed along with scan-time decode;
            analysis returns as the separate essentia enrichment
            scanner (this stored value will seed its default).
            Tag-sourced BPM/key (TBPM/TKEY etc.) is always ingested
            regardless. Default true.

    # ── Torrent feature schemas ─────────────────────────────────────────
    TorrentItem:
      type: object
      description: |
        A torrent as the daemon currently sees it. Returned by `GET
        /api/v1/admin/torrent/list`. `managedByMstream` is true iff the
        torrent's info_hash matches a row in `managed_torrents` for the
        active client — i.e. mStream added it via `/api/v1/torrent/add`.
      properties:
        clientTorrentId:
          type: string
          nullable: true
          description: Daemon-native id (Transmission's torrent-id, qBit's hash, etc.).
        infoHash:
          type: string
          description: 40-char lowercase hex SHA-1 of the bencoded info dict.
        name:        { type: string }
        status:
          type: string
          enum: [downloading, seeding, paused, queued, verifying, error, unknown]
        percent:     { type: number, minimum: 0, maximum: 1 }
        rateDownload: { type: integer, description: "Bytes per second." }
        rateUpload:   { type: integer }
        eta:         { type: integer, description: "Seconds, or -1 when unknown." }
        sizeBytes:   { type: integer }
        downloadedBytes: { type: integer }
        errorMessage: { type: string }
        addedAt:     { type: integer, description: "Unix epoch seconds." }
        doneAt:      { type: integer, description: "Unix epoch seconds; 0 when still downloading." }
        managedByMstream: { type: boolean }
        managedBy:
          type: string
          nullable: true
          description: Username of the user who added the torrent via mStream, when known.

    VpathAccessRow:
      type: object
      description: |
        One row of the per-(client, vpath) path-mapping cache. Maps
        an mStream library name to the absolute path the daemon uses
        for it. Drives the add-torrent gate at submission time.
      properties:
        daemonPath:      { type: string, description: "Daemon-side absolute path; null when unconfirmed." }
        mstreamWritable:
          type: boolean
          nullable: true
        confidence:
          type: string
          enum: [verified, inferred, pending, unconfirmed]
          description: |
            `verified` = daemon round-trip confirmed the shared filesystem view.
            `inferred` = daemon's save_path or known-paths match but no probe ran.
            `pending`  = a background probe is in flight.
            `unconfirmed` = probe failed or no row yet.
        source:
          type: string
          enum: [auto, manual]
        method:          { type: string, description: "How the row was derived (e.g. `deluge:known-paths`)." }
        lastProbedAt:    { type: integer, description: "Unix epoch seconds." }
        lastError:
          type: string
          nullable: true

    TorrentMetadata:
      type: object
      description: Metadata the 3-tier extraction pipeline produces.
      properties:
        artist: { type: string }
        album:  { type: string }
        year:   { type: string }
        genre:  { type: string }

    TorrentFileShape:
      type: object
      description: Tier-2 file-list heuristics. Helps the UI distinguish single-tracks from albums.
      properties:
        fileCount:              { type: integer }
        audioFileCount:         { type: integer }
        totalSize:              { type: integer }
        releaseType:            { type: string, enum: [single, album, compilation, unknown] }
        hasTrackNumberPrefixes: { type: boolean }
        hasAudio:               { type: boolean }

    TorrentClientCreds:
      type: object
      description: Shared shape for the three login forms. `username`/`rpcPath` are only set on the clients that need them.
      properties:
        host:     { type: string, example: "127.0.0.1" }
        port:     { type: integer, minimum: 1, maximum: 65535 }
        username: { type: string }
        password: { type: string, format: password }
        rpcPath:  { type: string, example: "/transmission/rpc", description: "Transmission only." }
        useHttps: { type: boolean, default: false }
        configured: { type: boolean, description: "Read-only on GET; true iff a host has been saved." }

    TorrentErrorEnvelope:
      type: object
      description: Standard error shape for `/api/v1/torrent/*` and `/api/v1/admin/torrent/*`.
      required: [ok, error, message]
      properties:
        ok:      { type: boolean, enum: [false] }
        error:   { type: string, description: "Stable machine-readable code." }
        message: { type: string, description: "Human-readable explanation." }

    SeedResult:
      type: object
      description: |
        Per-torrent result from `POST /api/v1/admin/torrent/seed-existing`.
        The route accepts ONE torrent per request; the admin UI fires
        N parallel requests and aggregates results client-side.

        Absolute on-disk paths (`vpathRoot`, `partialRoot`, `matchedRoot`)
        are admin-only and are STRIPPED from the user-facing
        `POST /api/v1/torrent/seed-existing` response — see
        `UserSeedResult` for that variant's contract.
      required: [ok, outcome]
      properties:
        ok:      { type: boolean, enum: [true] }
        outcome:
          type: string
          enum: [seeded, partial_match, no_match, already_in_daemon, invalid_torrent, daemon_error]
          description: |
            `seeded` — every file matched and the daemon accepted the add.
            `partial_match` — some files matched but not all; daemon not touched.
            `no_match` — no candidate vpath had any files present.
            `already_in_daemon` — the daemon already had this info-hash; no-op.
            `invalid_torrent` — the metainfo wasn't parseable.
            `daemon_error` — files matched but the daemon refused the add.
        infoHash:    { type: string, nullable: true, description: "Null when outcome=invalid_torrent." }
        name:        { type: string, nullable: true }
        # seeded + partial_match + daemon_error
        vpath:       { type: string, description: "Library where the files were found. Present on seeded/partial/daemon_error." }
        vpathRoot:   { type: string, description: "Absolute on-disk root of the vpath. Present on seeded/partial/daemon_error." }
        # seeded + daemon_error
        matchedRoot: { type: string, description: "Absolute on-disk path where the files live. Present on seeded/daemon_error." }
        addedAt:     { type: string, description: "Daemon-side absolute path the torrent was registered against. seeded only." }
        # partial_match only
        partialRoot: { type: string, description: "Absolute on-disk directory where the partial files live. partial_match only (top-level mirror of matches[0].partialRoot)." }
        matched:     { type: integer, description: "Count of files that matched. partial_match only (top-level mirror of matches[0].matched)." }
        total:       { type: integer, description: "Total file count in the torrent. partial_match only." }
        missing:
          type: array
          items: { type: string }
          description: "Forward-slash relative paths of missing/mismatched files. Capped at 20 entries. partial_match only."
        matches:
          type: array
          description: "One entry per vpath that had >0 matching files. Sorted by match ratio descending. partial_match only."
          items:
            type: object
            required: [vpath, vpathRoot, partialRoot, matched, total]
            properties:
              vpath:       { type: string }
              vpathRoot:   { type: string, description: "Absolute on-disk root of the matched library." }
              partialRoot: { type: string, description: "Absolute on-disk path of the directory where the partial files live." }
              matched:     { type: integer }
              total:       { type: integer }
              missing:
                type: array
                items: { type: string }
                description: "Forward-slash relative paths of missing files for this vpath."
        checkedVpaths:
          type: array
          items: { type: string }
          description: "Vpaths searched in this request. Present on partial_match and no_match."
        # invalid_torrent / daemon_error
        error:       { type: string, description: "Human-readable failure reason. invalid_torrent + daemon_error." }

    UserSeedResult:
      type: object
      description: |
        Per-torrent result from `POST /api/v1/torrent/seed-existing` —
        the user-facing variant of the admin `SeedResult` shape.
        Server-absolute filesystem paths (`vpathRoot`, `matchedRoot`,
        `partialRoot`, `addedAt`) are stripped before the response
        crosses the user boundary. For `partial_match`, each entry in
        `matches[]` carries a vpath-relative `relativePath` string the
        client can feed back into `POST /api/v1/torrent/add` as a
        `directoryName` + optional `subPath`. For `daemon_error`,
        the raw RPC failure message is replaced with a generic line
        so daemon-internal hostnames/versions/paths don't leak out.
      required: [ok, outcome]
      properties:
        ok:      { type: boolean, enum: [true] }
        outcome:
          type: string
          enum: [seeded, partial_match, no_match, already_in_daemon, invalid_torrent, daemon_error]
        infoHash:    { type: string, nullable: true }
        name:        { type: string, nullable: true }
        vpath:       { type: string, description: "Present on seeded/partial_match/daemon_error." }
        matched:     { type: integer, description: "partial_match only (mirror of matches[0].matched)." }
        total:       { type: integer, description: "partial_match only." }
        missing:
          type: array
          items: { type: string }
          description: "Forward-slash relative paths. partial_match only."
        relativePath:
          type: string
          description: "Top-level mirror of matches[0].relativePath. partial_match only."
        matches:
          type: array
          description: "One row per vpath with >0 matches. Sorted by match ratio desc. partial_match only."
          items:
            type: object
            required: [vpath, relativePath, matched, total]
            properties:
              vpath:        { type: string }
              relativePath: { type: string, description: "Forward-slash path relative to the vpath root. Feed as directoryName (+optional leading subPath segments) into /torrent/add." }
              matched:      { type: integer }
              total:        { type: integer }
              missing:
                type: array
                items: { type: string }
        checkedVpaths:
          type: array
          items: { type: string }
          description: "Present on partial_match and no_match."
        error:
          type: string
          description: |
            invalid_torrent: bencode parser message from the user's own upload.
            daemon_error: generic redaction — the raw daemon RPC error is NOT
            forwarded to non-admin callers.

  responses:
    EmptySuccess:
      description: Operation succeeded.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Empty" }
    Unauthorized:
      description: Auth required or token invalid.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Validation error or permission denied.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    AdminLocked:
      description: Admin API disabled (either by configuration or because the user is not an admin).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    ServerError:
      description: Server error.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

paths:

  # ── System ───────────────────────────────────────────────────────────────

  /:
    get:
      tags: [System]
      summary: Main webapp
      description: Serves the main webapp HTML. Redirects to `/login` if users exist and the request is unauthenticated.
      security: []
      responses:
        "200":
          description: HTML page.
          content:
            text/html:
              schema: { type: string }

  /admin:
    get:
      tags: [System]
      summary: Admin panel webapp
      description: Serves the admin panel HTML. Access-controlled the same way as `/`.
      security: []
      responses:
        "200":
          description: HTML page.
          content:
            text/html:
              schema: { type: string }

  /api:
    get:
      tags: [System]
      summary: API version discovery
      description: Returns the server version and the list of available API versions.
      security: []
      responses:
        "200":
          description: Version info.
          content:
            application/json:
              schema:
                type: object
                properties:
                  server:
                    type: string
                    description: Server version (from package.json).
                  apiVersions:
                    type: array
                    items: { type: string }
              example:
                server: "6.4.2"
                apiVersions: ["1"]

  /api/v1/ping:
    get:
      tags: [System]
      summary: Bootstrap payload
      description: |
        Returns everything the webapp needs on load: the user's libraries, their playlists,
        transcode capabilities, and server-level flags. Called once after login.
      responses:
        "200":
          description: Bootstrap info.
          content:
            application/json:
              schema:
                type: object
                properties:
                  vpaths:
                    type: array
                    items: { type: string }
                  playlists:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                  transcode:
                    oneOf:
                      - type: boolean
                        enum: [false]
                      - type: object
                        properties:
                          defaultCodec: { type: string }
                          defaultBitrate: { type: string }
                  noMkdir: { type: boolean }
                  noUpload: { type: boolean }
                  noFileModify: { type: boolean }
                  supportedAudioFiles:
                    type: object
                    additionalProperties: { type: boolean }
                  vpathMetaData:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        type: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ── Auth ─────────────────────────────────────────────────────────────────

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Log in
      description: |
        Authenticates with username + password. On success returns a JWT token and sets it as
        an `x-access-token` cookie with a 5-year max age. On failure, the response is delayed
        by 800ms to slow down brute-force attempts.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        "200":
          description: Authenticated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string, description: "JWT." }
                  vpaths:
                    type: array
                    items: { type: string }
        "401":
          description: Login failed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # ── Library ──────────────────────────────────────────────────────────────

  /api/v1/db/status:
    get:
      tags: [Library]
      summary: Library status
      description: Total track count across the user's accessible libraries and whether a scan is currently running.
      responses:
        "200":
          description: Status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalFileCount: { type: integer }
                  locked:
                    type: boolean
                    description: True while a scan is in progress.
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/db/metadata:
    post:
      tags: [Library]
      summary: Get metadata for a single track
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filepath]
              properties:
                filepath:
                  type: string
                  description: Virtual path.
      responses:
        "200":
          description: Metadata for the requested file.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Metadata" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/db/metadata/batch:
    post:
      tags: [Library]
      summary: Get metadata for multiple tracks
      description: Request body is a bare JSON array of virtual paths.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { type: string }
      responses:
        "200":
          description: Map of filepath → metadata.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: { $ref: "#/components/schemas/Metadata" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/db/artists:
    get: &artistsOp
      tags: [Library]
      summary: List all artists
      description: Unique artist names from the user's accessible libraries, case-insensitive sort.
      responses:
        "200":
          description: Artists.
          content:
            application/json:
              schema:
                type: object
                properties:
                  artists:
                    type: array
                    items: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      <<: *artistsOp
      requestBody:
        description: Optional `ignoreVPaths` filter.
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IgnoreVPaths" }

  /api/v1/db/artists-albums:
    post:
      tags: [Library]
      summary: List one artist's albums
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [artist]
                  properties:
                    artist: { type: string }
                - { $ref: "#/components/schemas/IgnoreVPaths" }
      responses:
        "200":
          description: Albums.
          content:
            application/json:
              schema:
                type: object
                properties:
                  albums:
                    type: array
                    items: { $ref: "#/components/schemas/Album" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/db/artists-albums-multi:
    post:
      tags: [Library]
      summary: List albums across several artists
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [artists]
              properties:
                artists:
                  type: array
                  items: { type: string }
      responses:
        "200":
          description: Albums.
          content:
            application/json:
              schema:
                type: object
                properties:
                  albums:
                    type: array
                    items: { $ref: "#/components/schemas/Album" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/db/albums:
    get: &albumsOp
      tags: [Library]
      summary: List all albums
      responses:
        "200":
          description: Albums.
          content:
            application/json:
              schema:
                type: object
                properties:
                  albums:
                    type: array
                    items: { $ref: "#/components/schemas/Album" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      <<: *albumsOp
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IgnoreVPaths" }

  /api/v1/db/album-songs:
    post:
      tags: [Library]
      summary: List tracks in an album
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [album]
                  properties:
                    album: { type: string }
                    artist: { type: string }
                    year: { type: integer }
                - { $ref: "#/components/schemas/IgnoreVPaths" }
      responses:
        "200":
          description: Tracks.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Metadata" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/db/genres:
    get: &genresOp
      tags: [Library]
      summary: List all genres
      responses:
        "200":
          description: Genres.
          content:
            application/json:
              schema:
                type: object
                properties:
                  genres:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        track_count: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      <<: *genresOp
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IgnoreVPaths" }

  /api/v1/db/genre-songs:
    post:
      tags: [Library]
      summary: List tracks in a genre
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [genre]
                  properties:
                    genre: { type: string }
                - { $ref: "#/components/schemas/IgnoreVPaths" }
      responses:
        "200":
          description: Tracks.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Metadata" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/db/genre-groups:
    get:
      tags: [Library]
      summary: Genre groups (Velvet)
      description: Alternative genre listing used by the Velvet UI.
      responses:
        "200":
          description: Genres with counts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  genres:
                    type: array
                    items:
                      type: object
                      properties:
                        genre: { type: string }
                        count: { type: integer }
                  groups: { type: object, nullable: true }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/db/genre/albums:
    post:
      tags: [Library]
      summary: Albums in a genre (Velvet)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [genre]
              properties:
                genre: { type: string }
      responses:
        "200":
          description: Albums.
          content:
            application/json:
              schema:
                type: object
                properties:
                  albums:
                    type: array
                    items: { $ref: "#/components/schemas/Album" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/db/genre/songs:
    post:
      tags: [Library]
      summary: Songs in a genre (Velvet)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [genre]
              properties:
                genre: { type: string }
      responses:
        "200":
          description: Tracks.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Metadata" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/db/decades:
    get:
      tags: [Library]
      summary: List decades (Velvet)
      responses:
        "200":
          description: Decades with counts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  decades:
                    type: array
                    items:
                      type: object
                      properties:
                        decade: { type: integer }
                        cnt: { type: integer }
                        albums: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/db/decade/albums:
    post:
      tags: [Library]
      summary: Albums in a decade (Velvet)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decade]
              properties:
                decade: { type: integer }
      responses:
        "200":
          description: Albums.
          content:
            application/json:
              schema:
                type: object
                properties:
                  albums:
                    type: array
                    items: { $ref: "#/components/schemas/Album" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/db/decade/songs:
    post:
      tags: [Library]
      summary: Songs in a decade (Velvet)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decade]
              properties:
                decade: { type: integer }
      responses:
        "200":
          description: Tracks.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Metadata" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/db/songs-by-artists:
    post:
      tags: [Library]
      summary: Random tracks by the given artists (Velvet)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [artists]
              properties:
                artists:
                  type: array
                  items: { type: string }
                limit: { type: integer }
      responses:
        "200":
          description: Tracks.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Metadata" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/db/random-songs:
    post:
      tags: [Library]
      summary: Get a random song (Auto-DJ)
      description: |
        Returns one random song. With no body fields set, behaves like the
        pre-V32 route — pick a random track from everything the user can see.

        When any BPM / key / artist filter is set the server runs a
        fallback waterfall that progressively relaxes constraints until
        at least one track matches.

        Without `artists`:
          1.  tight BPM + key
          2.  wide BPM + key (only if `bpmRangesWide` set)
          3.  tight BPM only (drop key)
          4.  wide BPM only (drop key)
          5.  unrestricted random within library + rating scope

        With `artists` (similar-artists Auto-DJ — typically the output
        of `GET /api/v1/lastfm/similar-artists`), a similar-prioritised
        chain runs FIRST, and only falls through to the chain above if
        every similar-artist combination is empty:
          1.  similar + tight BPM + key
          2.  similar + wide BPM + key
          3.  similar + tight BPM (drop key)
          4.  similar + wide BPM (drop key)
          5.  similar only (drop BPM/key)
          5b. similar (drop `ignoreArtists` cooldown — only if set)
          6-10. the non-similar chain above

        After the SQL-side waterfall, a tier filter sorts the surviving
        rows so an in-range pick wins over an unknown-tag pick wins over
        a known-wrong pick. The route always returns exactly one song
        (or 400 if scope is empty).

        Musical keys are Camelot codes (`1A`..`12B`). The server expands
        each code to all known raw-key spellings — `8A` matches stored
        values "A minor", "Am", "Amin", or literal "8A" — so tags from
        any common DJ-software convention work without client-side
        normalisation. Unknown codes silently match nothing.

        Tracks must have the corresponding column populated to be
        considered when a BPM or key constraint is active (NULL columns
        are excluded by the SQL filter, then re-considered as Tier 1
        candidates by the post-fallback tier filter). The scanner
        populates these columns from embedded `TBPM` / `TKEY` (ID3v2)
        or `BPM` / `KEY` / `INITIALKEY` (Vorbis) tags.

        `ignoreList` is a round-trip cursor — the server returns an
        updated list with the just-picked index appended, and clients
        echo it back on the next call to deduplicate across a session.
        The server trims older entries automatically when the list
        exceeds ~half the candidate-pool size; clients don't need to
        prune it themselves. Capped at 500 entries.
      requestBody:
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  properties:
                    minRating: { type: integer, minimum: 0, maximum: 10 }
                    ignoreList:
                      type: array
                      maxItems: 500
                      items: { type: integer, minimum: 0 }
                      description: |
                        Indices of recently-picked tracks to skip. Echo
                        back the `ignoreList` from the previous response
                        unchanged; the server appends + trims.
                    bpmRanges:
                      type: array
                      maxItems: 16
                      description: |
                        Primary BPM windows. Multiple ranges are OR-ed
                        in SQL — clients typically send three (normal
                        ± tolerance, half tempo, double tempo) for
                        octave-equivalent continuity. Tracks whose `bpm`
                        is NULL are excluded by this filter.
                      items:
                        type: object
                        required: [min, max]
                        properties:
                          min: { type: number }
                          max: { type: number }
                    bpmRangesWide:
                      type: array
                      maxItems: 16
                      description: |
                        Optional widened BPM windows used only by step
                        2 / step 4 of the waterfall when the tight
                        `bpmRanges` returned zero rows. Same shape as
                        `bpmRanges`.
                      items:
                        type: object
                        required: [min, max]
                        properties:
                          min: { type: number }
                          max: { type: number }
                    requireBpm:
                      type: boolean
                      description: |
                        When true, exclude tracks with NULL `bpm`. Ignored
                        when `bpmRanges` is set (the range filter already
                        requires non-null).
                    musicalKeys:
                      type: array
                      maxItems: 24
                      description: |
                        Camelot codes (`1A`..`12B`). Each code is
                        expanded server-side to all spellings the DB
                        might contain ("A minor" / "Am" / "Amin" / `8A`).
                        Sending only unrecognised codes returns 403; an
                        empty / omitted array disables the filter.
                      items: { type: string }
                    requireMusicalKey:
                      type: boolean
                      description: |
                        When true, exclude tracks with NULL `musical_key`.
                        Implicit when `musicalKeys` is non-empty.
                    artists:
                      type: array
                      maxItems: 100
                      description: |
                        Canonical library artist names — typically the
                        output of `GET /api/v1/lastfm/similar-artists`.
                        When set, the waterfall prioritises tracks
                        credited to any of these artists via primary,
                        featured (`track_artists`), or album-level
                        (`album_artists`) credit. Falls through to
                        non-similar picks only after every BPM/key
                        combination on the similar pool is empty.
                      items: { type: string }
                    ignoreArtists:
                      type: array
                      maxItems: 100
                      description: |
                        Recently-played artists to exclude (Auto-DJ
                        cooldown). Symmetric V18 widening: a cooldown
                        on "Foo" also drops "Foo feat. Bar" and tracks
                        on albums credited to Foo. The waterfall has a
                        drop-cooldown fallback step so a user who
                        blacklisted the entire library still gets a
                        pick from the similar pool.
                      items: { type: string }
                    genres:
                      type: array
                      maxItems: 200
                      description: |
                        Genre filter list (V35). Names are case-insensitive
                        and matched against `track_genres` (the M2M store
                        that replaced `tracks.genre` in V34). Pair with
                        `genreMode` to choose whitelist vs blacklist.
                        Empty / omitted → no filtering. This filter is an
                        ALWAYS-ON base condition — the waterfall never
                        relaxes it, so an over-narrow filter can produce
                        a 400 even when other constraints would pass.
                      items: { type: string, minLength: 1, maxLength: 200 }
                    genreMode:
                      type: string
                      enum: [whitelist, blacklist]
                      default: whitelist
                      description: |
                        `whitelist` (default) plays only tracks with at
                        least one matching genre; tracks with no
                        `track_genres` rows are BLOCKED. `blacklist`
                        skips tracks with any matching genre; tracks
                        with no `track_genres` rows are ALLOWED.
                - { $ref: "#/components/schemas/IgnoreVPaths" }
      responses:
        "200":
          description: One random song that satisfies the (possibly relaxed) constraints.
          content:
            application/json:
              schema:
                type: object
                properties:
                  songs:
                    type: array
                    items: { $ref: "#/components/schemas/Metadata" }
                  ignoreList:
                    type: array
                    items: { type: integer }
                    description: |
                      Updated cursor: previous request's `ignoreList`
                      with the just-picked index appended, plus any
                      server-side trimming. Echo back unchanged on the
                      next call.
        "400": { description: "No songs match the criteria, even after the waterfall fully drops them." }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: "Joi validation failed on the request body (e.g. bpmRange min > max, or `musicalKeys` contained no recognised Camelot codes)." }

