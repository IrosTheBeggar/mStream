  # ── Search ───────────────────────────────────────────────────────────────

  /api/v1/db/search:
    post:
      tags: [Search]
      summary: Full-text search
      description: |
        Searches artist names, album names, track titles, filepaths, and
        stored lyrics. Each category returns up to 30 matches.

        Three algorithms selectable via the `algorithm` request body
        field (default `combo`):

        - `basic` — LIKE only, no FTS5 involved. Infix substring match,
          alphabetical order. The pre-V31 behaviour, preserved as an
          escape hatch.
        - `fts5` — strict FTS5 MATCH. No LIKE fallback even on parse
          failure or SQLite-level error; the affected category just
          returns an empty array. Debug mode.
        - `combo` — FTS5 primary with per-category LIKE fallback when
          MATCH fails to parse or errors. The default — what every
          client gets unless it opts out.

        FTS5 semantics differ from LIKE in two user-visible ways:
        prefix matching only (e.g. `unny` does NOT match `Funny`,
        but `fun` does), and unicode61 diacritic folding (e.g. `ros`
        matches `Sigur Rós`). BM25 ranking replaces alphabetical
        ordering — terms with higher in-row frequency rank first.

        Per-category fallback in `combo` mode fires on SQLITE_ERROR
        (a malformed FTS5 MATCH expression that survived the JS
        parser) or when the parser refuses to build an expression
        (no alphanumeric tokens, single sub-2-char positive). Zero
        rows from a clean MATCH does NOT trigger fallback — that
        is a real "no match" result, not an error.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [search]
                  properties:
                    search: { type: string }
                    noArtists: { type: boolean }
                    noAlbums: { type: boolean }
                    noTitles: { type: boolean }
                    noFiles: { type: boolean }
                    noLyrics: { type: boolean }
                    algorithm:
                      type: string
                      enum: [basic, fts5, combo]
                      default: combo
                      description: |
                        Search algorithm. Unknown values return 400 via
                        the Joi validation middleware. When SQLite was
                        compiled without FTS5 support, both `fts5` and
                        `combo` are silently coerced to `basic` for
                        the lifetime of the process; a single warning
                        is logged at first request.
                - { $ref: "#/components/schemas/IgnoreVPaths" }
      responses:
        "200":
          description: |
            Search results — five parallel arrays, one per category.
            Group hits (artists, albums) share the minimal `name` /
            `album_art_file` / `filepath:false` shape; track hits (title,
            files, lyrics) additionally carry the full canonical `metadata`
            object (and lyrics a `snippet`). Across algorithms the per-item
            shapes are identical by construction — both the LIKE and FTS5
            paths route through the same shape* callbacks in
            `src/api/search.js`.
          content:
            application/json:
              schema:
                type: object
                properties:
                  artists:
                    type: array
                    items: { $ref: "#/components/schemas/SearchArtistOrAlbumItem" }
                    description: Matched artists. `filepath` is always `false`.
                  albums:
                    type: array
                    items: { $ref: "#/components/schemas/SearchArtistOrAlbumItem" }
                    description: Matched albums. `filepath` is always `false`.
                  title:
                    type: array
                    items: { $ref: "#/components/schemas/SearchTrackItem" }
                    description: Tracks whose title matched. `name` is rendered as
                      `"<artist> - <title>"` when an artist is known, otherwise just
                      the title. `filepath` is the library-prefixed path used by
                      `/media/<library>/<rest>` streaming.
                  files:
                    type: array
                    items: { $ref: "#/components/schemas/SearchTrackItem" }
                    description: Tracks whose filepath matched. `name` is the
                      library-prefixed path (same value as `filepath`).
                  lyrics:
                    type: array
                    items: { $ref: "#/components/schemas/SearchLyricsItem" }
                    description: Tracks whose stored lyrics matched. Each item
                      carries a `snippet` excerpt (FTS5 only) of the matching line.
        "401": { $ref: "#/components/responses/Unauthorized" }
        "400":
          description: |
            Joi validation failed. Returned for unknown `algorithm`
            values (anything outside `basic` / `fts5` / `combo`),
            missing `search`, or any other schema violation.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }

