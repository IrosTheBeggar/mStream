      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bootScanDelay]
              properties:
                bootScanDelay: { type: integer, minimum: 0, description: "Seconds." }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/params/compress-image:
    post:
      tags: [Admin - Scanner]
      summary: Set whether album art thumbnails are generated
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [compressImage]
              properties:
                compressImage: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/params/scan-commit-interval:
    post:
      tags: [Admin - Scanner]
      summary: Set scanner commit cadence
      description: Number of files between DB commits during a scan. Lower = shorter write-lock holds.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scanCommitInterval]
              properties:
                scanCommitInterval:
                  type: integer
                  minimum: 1
                  description: |
                    Tracks scanned per SQLite COMMIT. Soft-capped at 1000
                    server-side: values above 1000 are accepted but
                    clamped to 1000 (with a warning logged) rather than
                    rejected, so a typo in the admin UI doesn't 400.
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/params/auto-album-art:
    post:
      tags: [Admin - Scanner]
      summary: Toggle auto album art lookup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [autoAlbumArt]
              properties:
                autoAlbumArt: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/params/album-art-write-to-folder:
    post:
      tags: [Admin - Scanner]
      summary: Write fetched cover art as `cover.jpg` in the album folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [albumArtWriteToFolder]
              properties:
                albumArtWriteToFolder: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/params/album-art-write-to-file:
    post:
      tags: [Admin - Scanner]
      summary: Embed fetched cover art in audio files
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [albumArtWriteToFile]
              properties:
                albumArtWriteToFile: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/params/album-art-services:
    post:
      tags: [Admin - Scanner]
      summary: Select which services to query for album art
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [albumArtServices]
              properties:
                albumArtServices:
                  type: array
                  items:
                    type: string
                    enum: [musicbrainz, itunes, deezer]
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/force-compress-images:
    post:
      tags: [Admin - Scanner]
      summary: Re-run the album-art thumbnail compressor over the whole library
      responses:
        "200":
          description: Job status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  started: { type: boolean }
        "405": { $ref: "#/components/responses/AdminLocked" }


  /api/v1/admin/db/scan/all:
    post:
      tags: [Admin - Scanner]
      summary: Scan all libraries
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/scan/force-rescan:
    post:
      tags: [Admin - Scanner]
      summary: Rescan all libraries ignoring mtimes
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/scan/stats:
    get:
      tags: [Admin - Scanner]
      summary: Total track count in the DB
      responses:
        "200":
          description: Count.
          content:
            application/json:
              schema:
                type: object
                properties:
                  fileCount: { type: integer }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/scan/progress:
    get:
      tags: [Admin - Scanner]
      summary: Per-library scan progress (Velvet)
      responses:
        "200":
          description: Progress entries — one per running scan.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    vpath: { type: string }
                    pct: { type: number }
                    scanned: { type: integer }
                    expected: { type: integer, nullable: true }
                    currentFile: { type: string, nullable: true }
                    countingFound: { type: boolean }
        "405": { $ref: "#/components/responses/AdminLocked" }

  # ── Admin - Users ────────────────────────────────────────────────────────

  /api/v1/admin/users:
    get:
      tags: [Admin - Users]
      summary: List all users
      responses:
        "200":
          description: Users keyed by username.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: { $ref: "#/components/schemas/User" }
        "405": { $ref: "#/components/responses/AdminLocked" }
    put:
      tags: [Admin - Users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, vpaths]
              properties:
                username: { type: string }
                password: { type: string }
                vpaths:
                  type: array
                  items: { type: string }
                admin: { type: boolean, default: false }
                allowMkdir: { type: boolean, default: true }
                allowUpload: { type: boolean, default: true }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }
    delete:
      tags: [Admin - Users]
      summary: Delete a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username: { type: string }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/users/password:
    post:
      tags: [Admin - Users]
      summary: Change a user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/users/lastfm:
    post:
      tags: [Admin - Users]
      summary: Set Last.fm credentials for a user
      description: Note — the field names contain a typo (`lasftfm*`) that is preserved for backwards compatibility.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, lasftfmUser, lasftfmPassword]
              properties:
                username: { type: string }
                lasftfmUser: { type: string }
                lasftfmPassword: { type: string }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/users/vpaths:
    post:
      tags: [Admin - Users]
      summary: Update a user's library access list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, vpaths]
              properties:
                username: { type: string }
                vpaths:
                  type: array
                  items: { type: string }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/users/access:
    post:
      tags: [Admin - Users]
      summary: Update a user's role / permission flags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, admin, allowMkdir, allowUpload]
              properties:
                username: { type: string }
                admin: { type: boolean }
                allowMkdir: { type: boolean }
                allowUpload: { type: boolean }
                allowFileModify: { type: boolean, default: true }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  # ── Admin - Libraries ────────────────────────────────────────────────────

  /api/v1/admin/directories:
    get:
      tags: [Admin - Libraries]
      summary: List all libraries
      description: |
        Returns one of two shapes depending on caller:
        - Legacy (admin UI): `{ [vpath]: { root, type } }`
        - Velvet UI: array of `{ name, root, type }` when fetched via the Velvet route.
      responses:
        "200":
          description: Libraries.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    additionalProperties:
                      type: object
                      properties:
                        root: { type: string }
                        type: { type: string }
                  - type: array
                    items: { $ref: "#/components/schemas/Library" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/directory:
    put:
      tags: [Admin - Libraries]
      summary: Add a library
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [directory, vpath]
              properties:
                directory: { type: string, description: "Absolute filesystem path." }
                vpath:
                  type: string
                  pattern: "[a-zA-Z0-9-]+"
                autoAccess: { type: boolean, default: false }
                isAudioBooks: { type: boolean, default: false }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }
    delete:
      tags: [Admin - Libraries]
      summary: Remove a library
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vpath]
              properties:
                vpath:
                  type: string
                  pattern: "[a-zA-Z0-9-]+"
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  # ── Admin - Config ───────────────────────────────────────────────────────

  /api/v1/admin/lock-api:
    post:
      tags: [Admin - Config]
      summary: Lock or unlock the admin API
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lock]
              properties:
                lock: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/config:
    get:
      tags: [Admin - Config]
      summary: Get the server configuration
      responses:
        "200":
          description: Config.
          content:
            application/json:
              schema:
                type: object
                properties:
                  address: { type: string }
                  port: { type: integer }
                  noUpload: { type: boolean }
                  noMkdir: { type: boolean }
                  noFileModify: { type: boolean }
                  writeLogs: { type: boolean }
                  secret:
                    type: string
                    description: Last 4 characters only (the full secret is never returned).
                  ssl: { type: object }
                  storage: { type: object }
                  maxRequestSize: { type: string }
                  autoBootServerAudio: { type: boolean }
                  rustPlayerPort: { type: integer }
                  ui: { type: string, enum: [default, velvet] }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/config/max-request-size:
    post:
      tags: [Admin - Config]
      summary: Set max request body size
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [maxRequestSize]
              properties:
                maxRequestSize:
                  type: string
                  pattern: "[0-9]+(KB|MB)"
                  example: "50MB"
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/config/ui:
    post:
      tags: [Admin - Config]
      summary: Switch UI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ui]
              properties:
                ui:
                  type: string
                  enum: [default, velvet]
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/config/port:
    post:
      tags: [Admin - Config]
      summary: Change server port
      description: Triggers a server restart.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [port]
              properties:
                port: { type: integer }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/config/address:
    post:
      tags: [Admin - Config]
      summary: Change listen address
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address]
              properties:
                address:
                  type: string
                  format: ipv4
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/config/noupload:
    post:
      tags: [Admin - Config]
      summary: Enable/disable uploads server-wide
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [noUpload]
              properties:
                noUpload: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/config/nomkdir:
    post:
      tags: [Admin - Config]
      summary: Enable/disable directory creation server-wide
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [noMkdir]
              properties:
                noMkdir: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/config/nofilemodify:
    post:
      tags: [Admin - Config]
      summary: Enable/disable file modification server-wide
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [noFileModify]
              properties:
                noFileModify: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/config/write-logs:
    post:
      tags: [Admin - Config]
      summary: Enable/disable writing logs to disk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [writeLogs]
              properties:
                writeLogs: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/config/auto-boot-server-audio:
    post:
      tags: [Admin - Config]
      summary: Toggle auto-start of the Rust audio server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [autoBootServerAudio]
              properties:
                autoBootServerAudio: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/config/rust-player-port:
    post:
      tags: [Admin - Config]
      summary: Set the Rust audio server port
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rustPlayerPort]
              properties:
                rustPlayerPort: { type: integer, minimum: 1, maximum: 65535 }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/config/secret:
    post:
      tags: [Admin - Config]
      summary: Regenerate the JWT secret
      description: Invalidates every existing token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [strength]
              properties:
                strength:
                  type: integer
                  minimum: 1
                  description: Byte length of the generated secret.
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  # ── Admin - Transcode ────────────────────────────────────────────────────

  /api/v1/admin/transcode:
    get:
      tags: [Admin - Transcode]
      summary: Get transcode configuration
      responses:
        "200":
          description: Config + availability.
          content:
            application/json:
              schema:
                type: object
                properties:
                  defaultCodec: { type: string }
                  defaultBitrate: { type: string }
                  downloaded: { type: boolean, description: "Whether ffmpeg has been downloaded." }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/transcode/default-codec:
    post:
      tags: [Admin - Transcode]
      summary: Set default transcode codec
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [defaultCodec]
              properties:
                defaultCodec: { type: string, enum: [mp3, opus, aac] }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/transcode/default-bitrate:
    post:
      tags: [Admin - Transcode]
      summary: Set default transcode bitrate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [defaultBitrate]
              properties:
                defaultBitrate: { type: string, enum: ["64k", "96k", "128k", "192k"] }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/transcode/download:
    post:
      tags: [Admin - Transcode]
      summary: Download the bundled ffmpeg binary
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  # ── Admin - DLNA ─────────────────────────────────────────────────────────

  /api/v1/admin/dlna:
    get:
      tags: [Admin - DLNA]
      summary: DLNA configuration
      responses:
        "200":
          description: DLNA settings.
          content:
            application/json:
              schema:
                type: object
                properties:
                  mode: { type: string, enum: [disabled, same-port, separate-port] }
                  port: { type: integer }
                  name: { type: string }
                  uuid: { type: string }
                  browse: { type: string, enum: [flat, dirs, artist, album, genre] }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/dlna/browse:
    post:
      tags: [Admin - DLNA]
      summary: Set the DLNA default browse structure
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [browse]
              properties:
                browse: { type: string, enum: [flat, dirs, artist, album, genre] }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/dlna/mode:
    post:
      tags: [Admin - DLNA]
      summary: Enable/disable DLNA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode: { type: string, enum: [disabled, same-port, separate-port] }
                port: { type: integer, minimum: 1, maximum: 65535 }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  # ── Admin - SSL ──────────────────────────────────────────────────────────

  /api/v1/admin/ssl:
    post:
      tags: [Admin - SSL]
      summary: Upload SSL certificate and key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cert, key]
              properties:
                cert: { type: string, description: "Path to cert file." }
                key: { type: string, description: "Path to key file." }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }
    delete:
      tags: [Admin - SSL]
      summary: Remove SSL certificates
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  # ── Admin - Logs ─────────────────────────────────────────────────────────

  /api/v1/admin/logs/download:
    get:
      tags: [Admin - Logs]
      summary: Download server logs as a ZIP
      responses:
        "200":
          description: ZIP.
          content:
            application/zip:
              schema: { type: string, format: binary }
        "405": { $ref: "#/components/responses/AdminLocked" }

  # ── Admin - Shared ───────────────────────────────────────────────────────

  /api/v1/admin/db/shared:
    get:
      tags: [Admin - Shared]
      summary: List every shared playlist on the server
      responses:
        "200":
          description: Shared playlists.
          content:
            application/json:
              schema:
                type: array
                items: { type: object }
        "405": { $ref: "#/components/responses/AdminLocked" }
    delete:
      tags: [Admin - Shared]
      summary: Delete a shared playlist by id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id: { type: string }
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/shared/expired:
    delete:
      tags: [Admin - Shared]
      summary: Delete all expired shared playlists
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/db/shared/eternal:
    delete:
      tags: [Admin - Shared]
      summary: Delete all non-expiring shared playlists
      responses:
        "200": { $ref: "#/components/responses/EmptySuccess" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  # ── Admin - File Explorer ────────────────────────────────────────────────

  /api/v1/admin/file-explorer:
    post:
      tags: [Admin - File Explorer]
      summary: Browse the entire filesystem (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [directory]
              properties:
                directory: { type: string, description: "Absolute path, or `~` for home." }
                joinDirectory: { type: string }
      responses:
        "200":
          description: Listing.
          content:
            application/json:
              schema:
                type: object
                properties:
                  path: { type: string }
                  directories: { type: array, items: { type: object } }
                  files: { type: array, items: { type: object } }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/file-explorer/win-drives:
    get:
      tags: [Admin - File Explorer]
      summary: List Windows drive letters
      description: Returns an empty object on non-Windows hosts.
      responses:
        "200":
          description: Drive letters.
          content:
            application/json:
              schema:
                type: array
                items: { type: string, example: "C:\\" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/directory/follow-symlinks:
    post:
      tags: [Admin - Libraries]
      summary: Set the per-library followSymlinks flag (V21)
      description: |
        When `true`, the scanner follows symbolic links found INSIDE
        this library (a symlink entry is treated as the file/directory
        it points at). When `false` (default), nested symlink entries
        are skipped so scanned content stays strictly within the
        library's physical tree. The library root itself is always
        followed.

        Takes effect on the next scheduled or manual scan of this
        library — this endpoint does NOT trigger a rescan.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vpath, followSymlinks]
              properties:
                vpath:
                  type: string
                  pattern: "[a-zA-Z0-9-]+"
                followSymlinks: { type: boolean }
      responses:
        "200": { description: Flag updated. }
        "403": { description: Validation error. }
        "404": { description: Library not found. }
        "405": { $ref: "#/components/responses/AdminLocked" }

  # ── Admin - Subsonic ────────────────────────────────────────────────────

  /api/v1/admin/subsonic:
    get:
      tags: [Admin - Subsonic]
      summary: Current Subsonic config snapshot
      responses:
        "200":
          description: Subsonic mode + port.
          content:
            application/json:
              schema:
                type: object
                properties:
                  mode: { type: string, enum: [disabled, same-port, separate-port] }
                  port: { type: integer }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/subsonic/mode:
    post:
      tags: [Admin - Subsonic]
      summary: Change Subsonic mode (hot-reload)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode: { type: string, enum: [disabled, same-port, separate-port] }
                port: { type: integer, description: "Only required for separate-port." }
      responses:
        "200": { description: Updated. Server reboots to apply. }
        "403": { description: Validation error. }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/subsonic/stats:
    get:
      tags: [Admin - Subsonic]
      summary: Implemented methods, now-playing, lyrics-cache stats
      responses:
        "200":
          description: Stats for the admin panel card.
          content:
            application/json:
              schema:
                type: object
                properties:
                  methodsImplemented: { type: integer }
                  methods:
                    type: array
                    items: { type: string }
                  methodStatuses:
                    type: array
                    items:
                      type: object
                      properties:
                        name:   { type: string }
                        status: { type: string, enum: [full, stub] }
                  fullCount: { type: integer }
                  stubCount: { type: integer }
                  nowPlaying:
                    type: array
                    items:
                      type: object
                      properties:
                        username: { type: string }
                        trackId:  { type: integer }
                        title:    { type: string, nullable: true }
                        artist:   { type: string, nullable: true }
                        album:    { type: string, nullable: true }
                        sinceMs:  { type: integer }
                  lyrics:
                    type: object
                    description: LRCLib cache state + toggles.
                    properties:
                      lrclibEnabled:       { type: boolean }
                      writeSidecarEnabled: { type: boolean }
                      cache:
                        type: object
                        properties:
                          hit:     { type: integer }
                          miss:    { type: integer }
                          error:   { type: integer }
                          pending: { type: integer }
                          other:   { type: integer }
                          total:   { type: integer }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/subsonic/test:
    get:
      tags: [Admin - Subsonic]
      summary: Ping self via the configured Subsonic endpoint
      description: |
        Mints a throwaway API key, hits `/rest/ping` over HTTP, revokes the
        key, returns the round-trip result. Useful for the "test connection"
        button in the admin panel.
      responses:
        "200":
          description: Result of the probe.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:             { type: boolean }
                  latencyMs:      { type: integer }
                  serverVersion:  { type: string }
                  reason:         { type: string, description: "Only on failure." }
                  url:            { type: string }

  /api/v1/admin/subsonic/jukebox:
    get:
      tags: [Admin - Subsonic]
      summary: Live jukebox status (Rust audio backend)
      description: |
        Proxies to the bundled rust-server-audio process for its `/status` and
        `/queue` endpoints. Returns `{available:false, reason}` if the
        backend isn't running (autoBootServerAudio disabled or boot failed).
      responses:
        "200":
          description: Status snapshot.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [available]
                    properties:
                      available: { type: boolean, enum: [false] }
                      reason:    { type: string }
                  - type: object
                    required: [available]
                    properties:
                      available:   { type: boolean, enum: [true] }
                      playing:     { type: boolean }
                      paused:      { type: boolean }
                      position:    { type: number, description: "Seconds." }
                      duration:    { type: number, description: "Seconds." }
                      volume:      { type: number, minimum: 0, maximum: 1 }
                      currentFile: { type: string }
                      queueLength: { type: integer }
                      queueIndex:  { type: integer }
                      shuffle:     { type: boolean }
                      loopMode:    { type: string, enum: [none, one, all] }

  /api/v1/admin/subsonic/token-auth-attempts:
    get:
      tags: [Admin - Subsonic]
      summary: Recent token-auth rejects
      description: |
        mStream stores PBKDF2 hashes so can't support Subsonic token auth
        (`t=md5(password+salt)`). Clients that try it get an explicit error;
        each attempt is logged to a ring buffer (process-local, max 50) so
        the admin can see "DSub at 10.0.0.5 keeps trying, mint them a key."
      responses:
        "200":
          description: Recent attempts, most recent first.
          content:
            application/json:
              schema:
                type: object
                properties:
                  attempts:
                    type: array
                    items:
                      type: object
                      properties:
                        username: { type: string, nullable: true }
                        client:   { type: string, nullable: true }
                        at:       { type: integer, description: ms epoch. }
                        ua:       { type: string, nullable: true }
    delete:
      tags: [Admin - Subsonic]
      summary: Clear the token-auth-attempts ring buffer
      responses:
        "200": { description: Cleared. }

  /api/v1/admin/subsonic/mint-key:
    post:
      tags: [Admin - Subsonic]
      summary: Create a Subsonic API key on behalf of another user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, name]
              properties:
                username: { type: string }
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                  description: Key label. Required; distinguishes multiple keys on the same user.
      responses:
        "200":
          description: The freshly-minted key (view-once).
          content:
            application/json:
              schema:
                type: object
                required: [key, name, username]
                properties:
                  key:      { type: string }
                  username: { type: string }
                  name:     { type: string }
        "404": { description: User not found. }
        "403": { description: Validation error (missing `username` or `name`). }

  /api/v1/admin/users/subsonic-password:
    post:
      tags: [Admin - Subsonic]
      summary: Overwrite a user's password (admin-driven password reset for Subsonic clients)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string, minLength: 1 }
      responses:
        "200": { description: Password updated. }

  /api/v1/admin/subsonic/lyrics-cache/purge:
    post:
      tags: [Admin - Subsonic]
      summary: Purge the lyrics_cache table
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  enum: [full, retry]
                  default: full
                  description: |
                    `full` drops every row. `retry` drops only `error` and
                    `pending` rows (keeps hits) — use after a network outage.
      responses:
        "200":
          description: Count of rows deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  removed: { type: integer }
                  mode:    { type: string }
        "403": { description: Validation error (invalid mode). }

  /api/v1/admin/subsonic/lyrics-cache/enabled:
    post:
      tags: [Admin - Subsonic]
      summary: Toggle LRCLib external-lookup fallback
      description: |
        When disabled, no new LRCLib fetches fire (existing cached hits keep
        serving — clear them via `/purge`). On the enabled→disabled edge
        queued-but-not-yet-running jobs are cancelled; in-flight requests
        complete but their result is dropped.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
      responses:
        "200":
          description: Toggle persisted; cache rows untouched.
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:       { type: boolean }
                  cancelledJobs: { type: integer, description: Queue drops when disabling. }

  /api/v1/admin/subsonic/lyrics-cache/write-sidecar:
    post:
      tags: [Admin - Subsonic]
      summary: Toggle LRCLib→sidecar write-back
      description: |
        When enabled, a successful LRCLib hit ALSO writes a sibling `.lrc`
        (synced) or `.txt` (plain) next to the audio file. Never clobbers an
        existing sibling. Silent no-op on read-only filesystems.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
      responses:
        "200":
          description: Toggle persisted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  writeSidecar: { type: boolean }

  # ── Subsonic REST API (handled under /rest/*) ────────────────────────────
  # The Subsonic API uses its own auth scheme (u/p, u/t/s, or apiKey) and
  # its own envelope format, so the 61 methods aren't enumerated as mStream
  # JSON paths here. Spec:
  #   https://opensubsonic.netlify.app/docs/endpoints/
  # See the admin panel "API Surface" card for the live list of implemented
  # methods with FULL/STUB status per method.

  /rest/{method}:
    get:
      tags: [Subsonic API]
      summary: Subsonic / OpenSubsonic dispatch
      description: |
        Dispatch on `method` (e.g. `ping`, `getArtists`, `getAlbumList2`,
        `stream`, `getLyricsBySongId`). Full list at
        <https://opensubsonic.netlify.app/docs/endpoints/>.

        **Auth is Subsonic-native, NOT mStream JWT**: pass `u=<username>` and
        one of (`p=<plaintext|enc:HEX>`, `t=<md5(pw+salt)>` + `s=<salt>`, or
        `apiKey=<opaque>`). JWT cookies are ignored on `/rest/*`.

        `.view` suffix (e.g. `/rest/ping.view`) is also accepted for
        pre-1.4.0 compatibility.
      parameters:
        - name: method
          in: path
          required: true
          schema: { type: string }
        - name: f
          in: query
          schema: { type: string, enum: [json, xml, jsonp], default: xml }
        - name: u
          in: query
          schema: { type: string }
        - name: p
          in: query
          schema: { type: string }
        - name: t
          in: query
          schema: { type: string }
        - name: s
          in: query
          schema: { type: string }
        - name: apiKey
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Subsonic envelope (see `subsonic-response` schema in upstream spec).
      security: []   # uses its own auth params
    post:
      tags: [Subsonic API]
      summary: Same as GET (Subsonic allows either method on every endpoint)
      parameters:
        - name: method
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Subsonic envelope. }
      security: []

