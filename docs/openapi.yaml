  /api/v1/admin/torrent/status:
    get:
      tags: [Admin - Torrent]
      summary: Live connectivity probe against the active client
      responses:
        "200":
          description: Always HTTP 200 — disconnected is a normal UI state.
          content:
            application/json:
              schema:
                type: object
                properties:
                  connected:  { type: boolean }
                  configured: { type: boolean }
                  clientType: { type: string }
                  version:    { type: string, nullable: true }
                  rpcVersion: { type: string, nullable: true }
                  reason:     { type: string, nullable: true }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/torrent/list:
    get:
      tags: [Admin - Torrent]
      summary: All torrents the daemon currently knows about
      description: |
        Cross-joined against managed_torrents so each row is flagged
        with managedByMstream. Never 500s — daemon-unreachable responds
        with {torrents: [], error: '<reason>'}.
      responses:
        "200":
          description: Torrent rows.
          content:
            application/json:
              schema:
                type: object
                properties:
                  torrents:
                    type: array
                    items: { $ref: "#/components/schemas/TorrentItem" }
                  error:
                    type: string
                    nullable: true
                  clientType: { type: string }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/torrent/seed-existing:
    post:
      tags: [Admin - Torrent]
      summary: Check if a torrent's files exist on disk; if so, add for seeding
      description: |
        One torrent per request. The route enumerates `info.files` (or
        the single-file equivalent), checks each entry's size against
        the on-disk copy under `<vpathRoot>/<info.name>/`, and — when
        every file matches — hands the torrent to the daemon
        `paused: false` so it does its own SHA-1 verification and starts
        seeding without re-downloading.

        The UI uploads N torrents in parallel via Promise.allSettled.
        Every response is HTTP 200; per-torrent failures (invalid
        metainfo, daemon errors, partial matches) surface as outcome
        strings, not HTTP error codes.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [torrentFile]
              properties:
                torrentFile:
                  type: string
                  format: binary
                vpaths:
                  type: string
                  description: |
                    Optional JSON-encoded array of vpath names to check, in
                    priority order. First all-match wins. Defaults to every
                    library when omitted/empty.
                  example: '["music","testlib"]'
      responses:
        "200":
          description: Per-torrent result.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SeedResult" }
        "400":
          description: Bad multipart body or missing torrentFile.
          content: { application/json: { schema: { $ref: "#/components/schemas/TorrentErrorEnvelope" }}}
        "412":
          description: No active torrent client or no saved credentials.
          content: { application/json: { schema: { $ref: "#/components/schemas/TorrentErrorEnvelope" }}}
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/torrent/{infoHash}:
    delete:
      tags: [Admin - Torrent]
      summary: Remove an mStream-managed torrent from the daemon (files kept)
      description: |
        Drops the daemon-side torrent record without deleting on-disk
        data, then removes the managed_torrents row. Refuses to touch
        torrents NOT in managed_torrents (those were added directly
        through the daemon's own UI). A daemon-side failure does NOT
        block the SQL cleanup — the row is dropped regardless so the UI
        matches reality.
      parameters:
        - in: path
          name: infoHash
          required: true
          schema: { type: string, pattern: "^[a-f0-9]{40}$" }
      responses:
        "200":
          description: Removed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:                 { type: boolean, enum: [true] }
                  infoHash:           { type: string }
                  clientType:         { type: string }
                  managedRowsDropped: { type: integer }
                  daemonRemoveOk:     { type: boolean }
                  daemonRemoveError:
                    type: string
                    nullable: true
        "400":
          description: info_hash not 40-char lowercase hex.
          content: { application/json: { schema: { $ref: "#/components/schemas/TorrentErrorEnvelope" }}}
        "404":
          description: Hash not in managed_torrents.
          content: { application/json: { schema: { $ref: "#/components/schemas/TorrentErrorEnvelope" }}}
        "412":
          description: No saved credentials for the row's client_type.
          content: { application/json: { schema: { $ref: "#/components/schemas/TorrentErrorEnvelope" }}}
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/torrent/vpath-access:
    get:
      tags: [Admin - Torrent]
      summary: Per-(active client, vpath) path-mapping cache
      responses:
        "200":
          description: Cache rows keyed by vpath name.
          content:
            application/json:
              schema:
                type: object
                properties:
                  clientType: { type: string }
                  error:      { type: string }
                  vpaths:
                    type: object
                    additionalProperties: { $ref: "#/components/schemas/VpathAccessRow" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/torrent/vpath-access/auto-detect:
    post:
      tags: [Admin - Torrent]
      summary: Re-run the path-probe pipeline for one or all vpaths
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                vpathName: { type: string, description: "Omit to sweep every library." }
      responses:
        "200":
          description: Updated cache rows.
          content:
            application/json:
              schema:
                type: object
                properties:
                  clientType: { type: string }
                  vpaths:
                    type: object
                    additionalProperties: { $ref: "#/components/schemas/VpathAccessRow" }
        "404":
          description: Named vpath doesn't exist.
          content: { application/json: { schema: { $ref: "#/components/schemas/TorrentErrorEnvelope" }}}
        "409":
          description: No torrent client selected.
          content: { application/json: { schema: { $ref: "#/components/schemas/TorrentErrorEnvelope" }}}
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/torrent/vpath-access/manual:
    post:
      tags: [Admin - Torrent]
      summary: Set the daemon path for a vpath by hand
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vpathName, daemonPath]
              properties:
                vpathName:  { type: string }
                daemonPath: { type: string }
      responses:
        "200":
          description: Verified; cache row updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:         { type: boolean, enum: [true] }
                  clientType: { type: string }
                  daemonPath: { type: string }
                  confidence: { type: string }
        "404":
          description: Vpath unknown.
          content: { application/json: { schema: { $ref: "#/components/schemas/TorrentErrorEnvelope" }}}
        "409":
          description: No active client.
          content: { application/json: { schema: { $ref: "#/components/schemas/TorrentErrorEnvelope" }}}
        "412":
          description: No saved credentials.
          content: { application/json: { schema: { $ref: "#/components/schemas/TorrentErrorEnvelope" }}}
        "422":
          description: Daemon couldn't verify the supplied path. Row persisted with source=manual + confidence=unconfirmed.
          content: { application/json: { schema: { $ref: "#/components/schemas/TorrentErrorEnvelope" }}}
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/torrent/path-templates:
    get:
      tags: [Admin - Torrent]
      summary: List per-vpath path templates
      responses:
        "200":
          description: Templates plus the variable allowlist + sample metadata for the live preview.
          content:
            application/json:
              schema:
                type: object
                properties:
                  vpaths:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        template:
                          type: string
                          nullable: true
                  supportedVars:
                    type: array
                    items: { type: string, enum: [ARTIST, ALBUM, YEAR, GENRE, ALBUMARTIST] }
                  suggestedTemplate: { type: string }
                  sampleMetadata:    { $ref: "#/components/schemas/TorrentMetadata" }
        "405": { $ref: "#/components/responses/AdminLocked" }

  /api/v1/admin/torrent/path-templates/{vpath}:
    put:
      tags: [Admin - Torrent]
      summary: Set (or clear) the path template for one library
      description: |
        Validates the template at save time: parse + variable allowlist
        + brace balance + control-char rejection + leading-/ rejection.
        Then sample-resolves against the fixed sample metadata and
        re-validates the resolved path (no .., no absolute paths, no
        drive letters, no ~/$HOME). Sending null or empty/whitespace
        clears the template back to NULL.
      parameters:
        - in: path
          name: vpath
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                template:
                  type: string
                  maxLength: 500
                  nullable: true
      responses:
        "200":
          description: Saved or cleared.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:         { type: boolean, enum: [true] }
                  vpath:      { type: string }
                  template:
                    type: string
                    nullable: true
                  samplePath: { type: string }
        "400":
          description: Template rejected (unknown_variable, traversal, absolute_template, etc.).
          content: { application/json: { schema: { $ref: "#/components/schemas/TorrentErrorEnvelope" }}}
        "404":
          description: Vpath unknown.
          content: { application/json: { schema: { $ref: "#/components/schemas/TorrentErrorEnvelope" }}}
        "405": { $ref: "#/components/responses/AdminLocked" }
