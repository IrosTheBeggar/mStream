name: Build Bun Server

# Produces per-platform Bun standalone server bundles (binary + webapp/ + bin
# sidecars, zip). Runs on release tags, on manual dispatch, and on PRs that
# touch the build inputs (build-only — the release job is tag-gated). Each target
# builds on an OS runner; exec bits for committed sidecars are set by the bundler
# (scripts/build-bun.mjs), not relied on from the runner's checkout mode.
on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'src/**'
      - 'webapp/**'
      - 'bin/**'
      - 'cli-boot-wrapper.js'
      - 'scripts/build-bun.mjs'
      - 'package.json'
      - '.github/workflows/build-bun.yml'
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.key }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, key: win-x64,     smoke: true }
          - { os: ubuntu-latest,  key: linux-x64,    smoke: true }
          - { os: ubuntu-latest,  key: linux-arm64,  smoke: false }  # cross-compiled from x64
          - { os: ubuntu-latest,  key: linux-x64-musl,   smoke: false }  # musl (Alpine); a musl binary can't run on the glibc runner
          - { os: ubuntu-latest,  key: linux-arm64-musl, smoke: false }  # musl + cross-arch
          - { os: macos-latest,   key: darwin-arm64, smoke: true }   # native (Apple silicon runner)
          - { os: macos-latest,   key: darwin-x64,   smoke: false }  # cross-compiled from arm64
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install production dependencies
        run: npm ci --omit=dev

      # Bun can't download+extract its own baseline cross-runtime on the Windows
      # runner ("Failed to extract executable ... download may be incomplete"), so
      # fetch it ourselves and hand it to the build via --compile-executable-path
      # (build-bun.mjs reads BUN_COMPILE_EXEC_PATH). This lets win-x64 ship as a
      # baseline build (runs on pre-AVX2 CPUs) while still building Windows-on-
      # Windows so the .exe keeps its embedded icon.
      - name: Pre-fetch baseline runtime (win-x64)
        if: matrix.key == 'win-x64'
        shell: pwsh   # the runner's git-bash uses GNU tar, which can't extract a .zip
        run: |
          $V = (bun --version).Trim()
          Write-Host "bun $V - pre-fetching bun-windows-x64-baseline runtime"
          Invoke-WebRequest "https://github.com/oven-sh/bun/releases/download/bun-v$V/bun-windows-x64-baseline.zip" -OutFile baseline.zip
          Expand-Archive baseline.zip -DestinationPath baseline-rt -Force
          $exe = (Get-ChildItem -Recurse baseline-rt -Filter bun.exe | Select-Object -First 1).FullName
          if (-not $exe) { throw 'bun.exe not found in the baseline runtime archive' }
          "BUN_COMPILE_EXEC_PATH=$exe" | Add-Content -Path $env:GITHUB_ENV
          Write-Host "runtime: $exe"

      - name: Build + bundle (${{ matrix.key }})
        run: bun scripts/build-bun.mjs --target=${{ matrix.key }} --bundle

      - name: Smoke test (self-dispatch + boot + serve + scan)
        if: matrix.smoke
        shell: bash
        run: |
          set +e   # exit codes are checked explicitly; don't abort on a probe miss
          D=$(ls -d dist/stage/mStream-*-${{ matrix.key }})
          if [ -d "$D/mStream.app" ]; then BIN="$D/mStream.app/Contents/MacOS/mStream"; elif [ -f "$D/mStream.exe" ]; then BIN="$D/mStream.exe"; else BIN="$D/mStream-${{ matrix.key }}"; fi
          RUN=$(dirname "$BIN")
          echo "smoke binary: $BIN"

          # (1) self-dispatch: the binary must re-invoke itself as a worker
          OUT=$("$BIN" --mstream-worker=scanner '{}' 2>&1)
          echo "$OUT" | grep -q dbPath || { echo "FAIL: worker self-dispatch"; echo "$OUT"; exit 1; }
          echo "ok: worker self-dispatch"

          # (2) default-path boot (no -j): config.setup must create
          # appRoot/save/conf and NOT die with the fresh-bundle ENOENT — regression
          # guard for the bare/default (double-click) invocation. Port-independent:
          # only assert the default config was created without a config error (the
          # next step proves it actually serves).
          "$BIN" > "$RUN/default-boot.log" 2>&1 &
          DEF=$!
          sleep 7
          kill "$DEF" 2>/dev/null
          if grep -qiE "Failed to validate config|ENOENT" "$RUN/default-boot.log"; then echo "FAIL: default (no -j) boot — config setup error"; cat "$RUN/default-boot.log"; exit 1; fi
          test -f "$RUN/save/conf/default.json" || { echo "FAIL: default config not created at save/conf/default.json"; tail -25 "$RUN/default-boot.log"; exit 1; }
          rm -rf "$RUN/save"
          echo "ok: default boot created save/conf (no ENOENT)"

          # (3) boot + serve + scan. The repo's test fixtures are generated by the
          # test suite (not present in this build job), so make a tiny library here:
          # a 1s tagged mp3 via the runner's ffmpeg, or an empty dir if it's absent.
          WS=$(printf '%s' "$GITHUB_WORKSPACE" | tr '\134' '/')   # backslash -> slash for valid JSON on Windows
          MUSIC="$WS/smoke-music"
          mkdir -p "$MUSIC"
          ffmpeg -hide_banner -loglevel error -f lavfi -i "sine=frequency=440:duration=1" -metadata title=Smoke -metadata artist=CI "$MUSIC/smoke.mp3" -y || echo "ffmpeg unavailable; scanning an empty library"
          printf '{"port":3399,"folders":{"music":{"root":"%s"}}}\n' "$MUSIC" > "$RUN/smoke-config.json"
          "$BIN" -j "$RUN/smoke-config.json" > "$RUN/boot.log" 2>&1 &
          SRV=$!
          UP=0
          for i in $(seq 1 60); do
            sleep 1
            if curl -sf -o /dev/null "http://127.0.0.1:3399/api/v1/ping"; then UP=1; break; fi
          done
          sleep 3   # let the boot scan finish
          CODE=$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:3399/api/v1/ping" 2>/dev/null)
          echo "HTTP up=$UP after ~${i}s ; /api/v1/ping -> ${CODE:-000}"
          grep -iE "scan started|scan complete" "$RUN/boot.log"
          kill "$SRV" 2>/dev/null

          if [ "$CODE" != "200" ]; then echo "FAIL: server did not serve 200"; echo "--- boot.log ---"; cat "$RUN/boot.log"; exit 1; fi
          grep -q "Scan complete" "$RUN/boot.log" || { echo "FAIL: scan did not complete"; echo "--- boot.log ---"; cat "$RUN/boot.log"; exit 1; }
          echo "SMOKE OK: $BIN booted, served 200, and completed a scan"

      - name: Smoke test iroh native binding
        # Proves the standalone binary can dlopen the bundled @number0/iroh .node
        # (bin/iroh/, staged by build-bun.mjs) via NAPI_RS_NATIVE_LIBRARY_PATH —
        # remote access silently degrades if it can't, so assert it loudly. Only
        # the native (non-cross) targets can run here, same as the boot smoke.
        if: matrix.smoke
        shell: bash
        run: |
          set -e
          D=$(ls -d dist/stage/mStream-*-${{ matrix.key }})
          if [ -d "$D/mStream.app" ]; then BIN="$D/mStream.app/Contents/MacOS/mStream"; elif [ -f "$D/mStream.exe" ]; then BIN="$D/mStream.exe"; else BIN="$D/mStream-${{ matrix.key }}"; fi
          echo "iroh smoke binary: $BIN"
          OUT=$("$BIN" --mstream-worker=iroh-selftest '{}' 2>&1) || { echo "$OUT"; echo "FAIL: iroh self-test exited non-zero"; exit 1; }
          echo "$OUT"
          echo "$OUT" | grep -q IROH_OK || { echo "FAIL: iroh native binding did not load in the standalone binary"; exit 1; }
          echo "OK: iroh native binding loaded from the bundled .node"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: mStream-${{ matrix.key }}
          path: dist/mStream-*-${{ matrix.key }}.zip
          if-no-files-found: error

  release:
    name: Attach bundles to release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          path: bundles
          merge-multiple: true

      - name: Attach bundles to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        # This is the sole release pipeline: create the release as a DRAFT so it
        # can be reviewed and PUBLISHED manually (publishing is what fires the
        # downstream npm-publish / deploy-demo jobs), idempotent on same-tag
        # re-runs, then upload the bundles. A genuine create failure fails the job.
        run: |
          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$REPO" --title "$TAG" --generate-notes --draft
          fi
          gh release upload "$TAG" bundles/*.zip --clobber --repo "$REPO"
