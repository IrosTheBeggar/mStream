name: Test FFmpeg Bootstrap

on:
  workflow_dispatch:
  push:
    tags: ['*']

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-latest

          - name: Linux arm64
            runner: ubuntu-24.04-arm

          - name: Windows x64
            runner: windows-latest

          - name: macOS x64
            runner: macos-13

          - name: macOS arm64
            runner: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Run ffmpeg bootstrap test
        shell: bash
        timeout-minutes: 10
        run: |
          node --input-type=module -e "
            import path from 'path';
            import fs from 'fs';
            import { execSync } from 'child_process';
            import { fileURLToPath } from 'url';

            // Minimal config stub so ffmpeg-bootstrap can resolve getFfmpegDir()
            const testDir = path.join(process.cwd(), 'test-ffmpeg-bin');
            fs.mkdirSync(testDir, { recursive: true });

            // Patch config before importing the module
            const configModule = await import('./src/state/config.js');
            configModule.program = {
              transcode: { ffmpegDirectory: testDir }
            };

            // Stub winston so it doesn't crash on missing transports
            const winston = await import('winston');
            if (!winston.default.transports || winston.default.transports.length === 0) {
              winston.default.add(new winston.default.transports.Console({ silent: false }));
            }

            const { ensureFfmpeg, ffmpegBin, ffprobeBin } = await import('./src/util/ffmpeg-bootstrap.js');

            console.log('Platform:', process.platform, process.arch);
            console.log('FFmpeg dir:', testDir);
            console.log('');

            // Step 1: Download
            console.log('=== Downloading ffmpeg ===');
            await ensureFfmpeg();

            // Step 2: Verify files exist
            const ffmpegPath = ffmpegBin();
            const ffprobePath = ffprobeBin();

            if (!fs.existsSync(ffmpegPath)) {
              console.error('FAIL: ffmpeg binary not found at', ffmpegPath);
              process.exit(1);
            }
            if (!fs.existsSync(ffprobePath)) {
              console.error('FAIL: ffprobe binary not found at', ffprobePath);
              process.exit(1);
            }
            console.log('PASS: Both binaries exist');

            // Step 3: Execute ffmpeg -version
            console.log('');
            console.log('=== Testing ffmpeg -version ===');
            try {
              const version = execSync(ffmpegPath + ' -version', { encoding: 'utf8', timeout: 10000 });
              const firstLine = version.split('\n')[0];
              console.log(firstLine);

              if (!firstLine.includes('ffmpeg version')) {
                console.error('FAIL: unexpected version output');
                process.exit(1);
              }
              console.log('PASS: ffmpeg executes correctly');
            } catch (e) {
              console.error('FAIL: ffmpeg execution error:', e.message);
              process.exit(1);
            }

            // Step 4: Execute ffprobe -version
            console.log('');
            console.log('=== Testing ffprobe -version ===');
            try {
              const version = execSync(ffprobePath + ' -version', { encoding: 'utf8', timeout: 10000 });
              const firstLine = version.split('\n')[0];
              console.log(firstLine);

              if (!firstLine.includes('ffprobe version')) {
                console.error('FAIL: unexpected version output');
                process.exit(1);
              }
              console.log('PASS: ffprobe executes correctly');
            } catch (e) {
              console.error('FAIL: ffprobe execution error:', e.message);
              process.exit(1);
            }

            console.log('');
            console.log('=== All tests passed ===');
          "
