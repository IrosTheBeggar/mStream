name: Build Rust Parser Binaries (musl)

# Produces statically-linked musl binaries that run on Alpine Linux,
# Void Linux, distroless musl images, and any other musl-libc distro.
# Uses cross-rs/cross for all targets — same pattern as build-rust-parser.yml.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build + self-test only; do not commit the binaries'
        type: boolean
        default: false
  push:
    branches: [master]
    paths:
      - 'rust-parser/**'
      - '.github/workflows/build-rust-parser-musl.yml'

jobs:
  build:
    name: Build ${{ matrix.binary_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Every leg is self-tested before commit (see the "Self-test" step).
        # These binaries are STATICALLY linked, so the x64 host can run them
        # all: x64-musl natively, and the ARM ones (emulate: true) under
        # qemu-user with no sysroot. (build-rust-parser.yml leaves its cross
        # ARM *gnu* legs unverified because dynamic glibc would need a sysroot
        # under qemu — static musl has no such issue.)
        include:
          - target: x86_64-unknown-linux-musl
            binary_name: rust-parser-linux-x64-musl

          - target: aarch64-unknown-linux-musl
            binary_name: rust-parser-linux-arm64-musl
            emulate: true

          - target: armv7-unknown-linux-musleabihf
            binary_name: rust-parser-linux-arm-musl
            emulate: true

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-parser
          key: ${{ matrix.target }}

      - name: Install cross
        run: |
          curl -fsSL https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C "$HOME/.cargo/bin"

      - name: Build
        run: cross build --release --target ${{ matrix.target }} --manifest-path rust-parser/Cargo.toml

      - name: Stage binary
        run: |
          mkdir -p staging
          cp "rust-parser/target/${{ matrix.target }}/release/rust-parser" "staging/${{ matrix.binary_name }}"
          chmod +x "staging/${{ matrix.binary_name }}"

      # Register binfmt handlers so the x64 host can transparently execute the
      # foreign-arch (aarch64 / armv7) static musl binaries via qemu-user.
      - name: Set up QEMU
        if: matrix.emulate
        uses: docker/setup-qemu-action@v3

      # Gate the commit on the freshly built binary actually executing — the
      # same guard as build-rust-parser.yml, now covering all three musl legs
      # (x64 natively, ARM under qemu). A binary that can't run prints nothing;
      # on failure the leg fails and commit-binaries (needs: build) is skipped.
      - name: Self-test the freshly built binary
        shell: bash
        run: |
          bin="staging/${{ matrix.binary_name }}"
          echo "self-testing: $bin"
          head -c 100000 /dev/zero > sample.mp3
          out="$("$bin" --audio-hash sample.mp3)"
          echo "  --audio-hash: $out"
          echo "$out" | grep -q '"fileHash":"' \
            || { echo "::error::self-test: --audio-hash produced no/invalid output"; exit 1; }
          wf="$("$bin" --waveform sample.mp3)"
          echo "  --waveform: ${wf:0:60}"
          echo "$wf" | grep -q '"bars":' \
            || { echo "::error::self-test: --waveform produced no/invalid output"; exit 1; }
          echo "self-test passed: ${{ matrix.binary_name }}"

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.binary_name }}
          path: staging/${{ matrix.binary_name }}
          retention-days: 1

  commit-binaries:
    name: Commit binaries
    needs: build
    # Skipped on a dry-run dispatch (build + self-test only).
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          path: bin/rust-parser
          merge-multiple: true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # chmod BEFORE staging: a file download-artifact CREATES (vs
          # overwrites) lands 644, and an index-only mode fix leaves an
          # unstaged mode change that breaks `git pull --rebase` below.
          # See build-rust-parser.yml for the full story.
          chmod +x bin/rust-parser/rust-parser-*-musl*
          git add bin/rust-parser/rust-parser-*-musl*
          # Belt-and-braces: force 100755 in the index so user checkouts
          # get `+x` regardless.
          git update-index --chmod=+x bin/rust-parser/rust-parser-*-musl*
          if git diff --cached --quiet; then
            echo "No binary changes to commit"
          else
            git commit -m "ci: update pre-built rust-parser musl binaries"
            # Rebase-and-retry: sibling binary workflows race this push —
            # see build-rust-parser.yml's commit step for the rationale.
            for attempt in 1 2 3 4 5; do
              git pull --rebase origin ${{ github.ref_name }}
              if git push; then exit 0; fi
              echo "push rejected (attempt $attempt) — a sibling workflow pushed; retrying"
              sleep $(( (RANDOM % 5) + 2 ))
            done
            echo "::error::binary push failed after 5 attempts"
            exit 1
          fi
