name: Test

on:
  push:
    branches: [master]
  pull_request:

# A new push to the same branch / PR cancels the in-flight run.
concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }} · ${{ matrix.shard }}/3)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      # Don't let one OS failing cancel the others — we want the full matrix.
      fail-fast: false
      matrix:
        # macOS is deferred: it has pre-existing scanner/rust-parity failures
        # to resolve before it can gate. Re-add macos-latest once those are
        # fixed (the macOS ffmpeg step below is already in place for it).
        os: [ubuntu-latest, windows-latest]
        # Split the suite across 3 shards per OS — node --test partitions the
        # files, so the ~32 server-booting tests run in parallel across jobs.
        shard: [1, 2, 3]

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      # setup-ffmpeg installs a static build on Linux/Windows reliably, but is
      # flaky on the macOS runners — use Homebrew there. Both put ffmpeg +
      # ffprobe on PATH, which the staging step below copies into bin/ffmpeg/.
      - name: Install ffmpeg (Linux/Windows)
        if: runner.os != 'macOS'
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      # The fixture generator (and the server's transcoder) look for ffmpeg at
      # bin/ffmpeg/ — the bundled binary is gitignored, so it isn't in the
      # checkout. Stage the just-installed ffmpeg/ffprobe there.
      - name: Stage ffmpeg into bin/ffmpeg/ (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p bin/ffmpeg
          cp "$(command -v ffmpeg)"  bin/ffmpeg/ffmpeg
          cp "$(command -v ffprobe)" bin/ffmpeg/ffprobe
          chmod +x bin/ffmpeg/ffmpeg bin/ffmpeg/ffprobe

      - name: Stage ffmpeg into bin/ffmpeg/ (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force bin/ffmpeg | Out-Null
          Copy-Item (Get-Command ffmpeg).Source  bin/ffmpeg/ffmpeg.exe
          Copy-Item (Get-Command ffprobe).Source bin/ffmpeg/ffprobe.exe

      - name: Install dependencies
        run: npm ci

      # Build the fixture library once (normally npm's `pretest`), then run
      # this shard. The rust-parser binary isn't built here, so scanner-parity
      # tests skip (they compare against / fall back to the JS scanner).
      - name: Build fixtures
        run: npm run pretest

      # --test-concurrency=8 (2x the runner's cores) lets the I/O-bound server
      # boots in this shard overlap; local `npm test` keeps Node's core-aware
      # default.
      - name: Run tests (shard ${{ matrix.shard }}/3)
        run: node --test --test-reporter=spec --test-concurrency=8 --test-shard=${{ matrix.shard }}/3 "test/**/*.test.mjs"
