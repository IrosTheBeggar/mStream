name: Build Rust Parser Binaries

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build + self-test only; do not commit the binaries'
        type: boolean
        default: false
  push:
    branches: [master]
    paths: ['rust-parser/**']

jobs:
  build:
    name: Build ${{ matrix.binary_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # self_test: run the freshly built binary before committing it (see the
        # "Self-test" step). Enabled on every leg whose binary can execute on
        # its build host — natively (windows-x64, darwin-arm64, linux-x64) or
        # via Rosetta 2 (darwin-x64 on the arm64 runner). The cross-built ARM
        # Linux binaries can't run on the x64 host, so they're left unverified.
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            binary_name: rust-parser-win32-x64.exe
            use_cross: false
            self_test: true

          - target: x86_64-apple-darwin
            runner: macos-latest
            binary_name: rust-parser-darwin-x64
            use_cross: false
            self_test: true

          - target: aarch64-apple-darwin
            runner: macos-latest
            binary_name: rust-parser-darwin-arm64
            use_cross: false
            self_test: true

          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            binary_name: rust-parser-linux-x64
            use_cross: false
            self_test: true

          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            binary_name: rust-parser-linux-arm64
            use_cross: true

          - target: armv7-unknown-linux-gnueabihf
            runner: ubuntu-latest
            binary_name: rust-parser-linux-arm
            use_cross: true

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-parser
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: |
          curl -fsSL https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C "$HOME/.cargo/bin"

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --manifest-path rust-parser/Cargo.toml
          else
            cargo build --release --target ${{ matrix.target }} --manifest-path rust-parser/Cargo.toml
          fi
        shell: bash

      - name: Rename binary
        run: |
          src="rust-parser/target/${{ matrix.target }}/release/rust-parser"
          if [[ "${{ matrix.binary_name }}" == *.exe ]]; then
            src="${src}.exe"
          fi
          mkdir -p staging
          cp "$src" "staging/${{ matrix.binary_name }}"
        shell: bash

      # Gate the commit on the freshly built binary actually executing. A
      # binary that can't launch (bad arch / unsigned / dyld or SDK mismatch)
      # prints nothing — which is exactly how a broken darwin-arm64 binary once
      # shipped silently. The file content is irrelevant: a zero-filled blob is
      # enough for the binary to launch, read it, MD5 it, and emit JSON, which
      # proves the executable is sound. If this fails, the leg fails and
      # commit-binaries (needs: build) is skipped, so the bad binary never lands.
      - name: Self-test the freshly built binary
        if: matrix.self_test
        shell: bash
        run: |
          bin="staging/${{ matrix.binary_name }}"
          echo "self-testing: $bin"
          head -c 100000 /dev/zero > sample.mp3
          out="$("$bin" --audio-hash sample.mp3)"
          echo "  --audio-hash: $out"
          echo "$out" | grep -q '"fileHash":"' \
            || { echo "::error::self-test: --audio-hash produced no/invalid output"; exit 1; }
          wf="$("$bin" --waveform sample.mp3)"
          echo "  --waveform: ${wf:0:60}"
          echo "$wf" | grep -q '"bars":' \
            || { echo "::error::self-test: --waveform produced no/invalid output"; exit 1; }
          echo "self-test passed: ${{ matrix.binary_name }}"

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.binary_name }}
          path: staging/${{ matrix.binary_name }}
          retention-days: 1

  commit-binaries:
    name: Commit binaries
    needs: build
    # Skipped on a dry-run dispatch (build + self-test only).
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          path: bin/rust-parser
          merge-multiple: true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Restore the exec bit ON DISK before staging. Artifact zips strip
          # it; for binaries that already exist in the repo the download
          # merely overwrites content (checkout already gave them 755), but a
          # file download-artifact CREATES (a new platform leg's first run)
          # lands as 644 — and staging the mode via update-index alone then
          # leaves an unstaged mode change that makes `git pull --rebase`
          # refuse to run (this bit build-p2p-sidecar.yml's bootstrap).
          chmod +x bin/rust-parser/rust-parser-*
          git add bin/rust-parser/rust-parser-*
          # Belt-and-braces: force 100755 in the index regardless — without
          # +x, scanners spawn the binary and hit EACCES on every boot. Run
          # AFTER `git add` but BEFORE the diff check so a pure-mode flip
          # still skips the commit when content is unchanged.
          git update-index --chmod=+x bin/rust-parser/rust-parser-*
          if git diff --cached --quiet; then
            echo "No binary changes to commit"
          else
            git commit -m "ci: update pre-built rust-parser binaries"
            # Sibling binary workflows can land on the same push (the
            # glibc + musl pairs share path triggers, and one commit can
            # match several families) and their commit jobs race: a
            # sibling pushing between our rebase and our push gets this
            # push rejected — run 29967087650's glibc leg lost exactly
            # that race and needed a manual rerun. Rebase-and-retry until
            # it lands: each workflow writes a disjoint file set, so the
            # rebase is always clean and a few attempts always converge.
            # (A shared concurrency group would be WRONG here — GitHub
            # keeps only one pending run per group and cancels the rest,
            # silently dropping a sibling's binary update.)
            for attempt in 1 2 3 4 5; do
              git pull --rebase origin ${{ github.ref_name }}
              if git push; then exit 0; fi
              echo "push rejected (attempt $attempt) — a sibling workflow pushed; retrying"
              sleep $(( (RANDOM % 5) + 2 ))
            done
            echo "::error::binary push failed after 5 attempts"
            exit 1
          fi
