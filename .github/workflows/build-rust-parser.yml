name: Build Rust Parser Binaries

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths: ['rust-parser/**']

jobs:
  build:
    name: Build ${{ matrix.binary_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            binary_name: rust-parser-win32-x64.exe
            use_cross: false

          - target: x86_64-apple-darwin
            runner: macos-latest
            binary_name: rust-parser-darwin-x64
            use_cross: false

          - target: aarch64-apple-darwin
            runner: macos-latest
            binary_name: rust-parser-darwin-arm64
            use_cross: false

          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            binary_name: rust-parser-linux-x64
            use_cross: false

          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            binary_name: rust-parser-linux-arm64
            use_cross: true

          - target: armv7-unknown-linux-gnueabihf
            runner: ubuntu-latest
            binary_name: rust-parser-linux-arm
            use_cross: true

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-parser
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: |
          curl -fsSL https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C "$HOME/.cargo/bin"

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --manifest-path rust-parser/Cargo.toml
          else
            cargo build --release --target ${{ matrix.target }} --manifest-path rust-parser/Cargo.toml
          fi
        shell: bash

      - name: Rename binary
        run: |
          src="rust-parser/target/${{ matrix.target }}/release/rust-parser"
          if [[ "${{ matrix.binary_name }}" == *.exe ]]; then
            src="${src}.exe"
          fi
          mkdir -p staging
          cp "$src" "staging/${{ matrix.binary_name }}"
        shell: bash

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.binary_name }}
          path: staging/${{ matrix.binary_name }}
          retention-days: 1

  commit-binaries:
    name: Commit binaries
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          path: bin/rust-parser
          merge-multiple: true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bin/rust-parser/rust-parser-*
          if git diff --cached --quiet; then
            echo "No binary changes to commit"
          else
            git commit -m "ci: update pre-built rust-parser binaries"
            git pull --rebase origin ${{ github.ref_name }}
            git push
          fi
