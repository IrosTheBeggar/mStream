<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Downloads - mStream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="apple-touch-icon" sizes="180x180" href="../assets/fav/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/fav/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/fav/favicon-16x16.png">
  <link rel="manifest" href="../assets/fav/site.webmanifest">
  <link rel="mask-icon" href="../assets/fav/safari-pinned-tab.svg" color="#5bbad5">
  <link rel="shortcut icon" href="../assets/fav/favicon.ico">
  <meta name="msapplication-TileColor" content="#da532c">
  <meta name="msapplication-config" content="../assets/fav/browserconfig.xml">
  <meta name="theme-color" content="#ffffff">

  <script defer src="../assets/js/lib/axios.js"></script>
  <link rel="stylesheet" href="../assets/css/materialize.css">
  <script defer src="../assets/js/lib/materialize.js"></script>

  <style>
    body {
      background-color: #1e2228;
      color: #FFF;
    }

    .back-link {
      display: inline-block;
      margin: 20px 0;
      color: #6684B2;
    }

    h4 {
      margin-top: 20px;
    }

    table {
      background-color: #282c34;
    }

    th {
      color: #6684B2;
    }

    .status-downloading { color: #ffca28; }
    .status-complete { color: #66bb6a; }
    .status-error { color: #ef5350; }

    #empty-msg {
      color: #888;
      padding: 20px 0;
    }
  </style>
</head>

<body>
  <div class="container">
    <a href="/" class="back-link">&larr; Back to mStream</a>
    <h4>Downloads</h4>

    <div id="empty-msg">No active downloads</div>

    <table class="striped" id="downloads-table" style="display:none;">
      <thead>
        <tr>
          <th>URL</th>
          <th>Codec</th>
          <th>Status</th>
          <th>Started</th>
        </tr>
      </thead>
      <tbody id="downloads-body">
      </tbody>
    </table>
  </div>

  <script>
    function formatTime(ts) {
      var d = new Date(ts);
      return d.toLocaleTimeString();
    }

    function fetchDownloads() {
      var token = localStorage.getItem('token');
      var headers = token ? { 'x-access-token': token } : {};

      axios.get('/api/v1/ytdl/downloads', { headers: headers })
        .then(function(response) {
          var downloads = response.data.downloads;
          var tbody = document.getElementById('downloads-body');
          var table = document.getElementById('downloads-table');
          var emptyMsg = document.getElementById('empty-msg');

          if (downloads.length === 0) {
            table.style.display = 'none';
            emptyMsg.style.display = 'block';
            return;
          }

          table.style.display = 'table';
          emptyMsg.style.display = 'none';
          tbody.innerHTML = '';

          downloads.forEach(function(dl) {
            var row = document.createElement('tr');
            row.innerHTML =
              '<td><a href="' + dl.url + '" target="_blank" style="color:#6684B2;">' + dl.url + '</a></td>' +
              '<td>' + dl.outputCodec + '</td>' +
              '<td class="status-' + dl.status + '">' + dl.status + '</td>' +
              '<td>' + formatTime(dl.startTime) + '</td>';
            tbody.appendChild(row);
          });
        })
        .catch(function() {});
    }

    document.addEventListener('DOMContentLoaded', function() {
      fetchDownloads();
      setInterval(fetchDownloads, 3000);
    });
  </script>
</body>
</html>
